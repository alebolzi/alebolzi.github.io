<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ Infinite Drift Overdrive: Enhanced Precision Edition</title>
    <style>
        :root {
            --bg-color: #030305;
            --panel-bg: rgba(6, 6, 10, 0.9);
            --accent-player: #ffffff;
            --accent-gold: #ffd700;
            --accent-danger: #ff0055;
            --text-main: #f8fafc;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: #060609;
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 5;
        }

        .hud-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            padding: 14px 28px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #score-value {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        #combo-mult {
            font-size: 28px;
            font-weight: bold;
            color: var(--accent-gold);
            text-align: right;
        }

        .bottom-ui {
            position: absolute;
            bottom: 20px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            z-index: 5;
            pointer-events: none;
        }

        #enemy-counter { left: 20px; color: #94a3b8; }
        #intensity-gauge { right: 20px; color: var(--accent-danger); font-weight: bold; }

        /* Controlli Mobile */
        #mobile-controls {
            display: none;
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            padding: 0 25px;
            box-sizing: border-box;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }

        .ctrl-btn {
            pointer-events: auto;
            width: 85px;
            height: 85px;
            background: rgba(15, 15, 25, 0.65);
            backdrop-filter: blur(6px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            touch-action: none;
        }

        .ctrl-btn:active {
            background: rgba(255, 255, 255, 0.25);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.4);
        }

        #btn-handbrake {
            width: 75px;
            height: 75px;
            border-color: rgba(255, 215, 0, 0.3);
            color: var(--accent-gold);
            font-size: 22px;
        }

        #btn-handbrake:active {
            background: rgba(255, 215, 0, 0.25);
            border-color: var(--accent-gold);
        }

        @media (pointer: coarse), (max-width: 1024px) {
            #mobile-controls { display: flex; }
            #enemy-counter { bottom: 140px; }
            #intensity-gauge { bottom: 140px; }
        }

        #game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 2, 4, 0.96);
            backdrop-filter: blur(10px);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 15;
        }

        #game-over-screen h1 {
            color: var(--accent-danger);
            font-size: 54px;
            margin: 0 0 15px 0;
            letter-spacing: 4px;
            text-shadow: 0 0 25px rgba(255, 0, 85, 0.3);
            text-align: center;
        }

        #game-over-screen p {
            font-size: 16px;
            margin: 5px 0 30px 0;
            color: #94a3b8;
            max-width: 500px;
            text-align: center;
            line-height: 1.6;
            padding: 0 20px;
        }

        .restart-btn {
            background: transparent;
            border: 2px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 16px 40px;
            font-size: 16px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
            pointer-events: auto;
        }

        .restart-btn:hover, .restart-btn:active {
            background: var(--accent-gold);
            color: #000;
            box-shadow: 0 0 25px var(--accent-gold);
        }
        
        .tip-key {
            display: inline-block;
            background: #334155;
            color: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 14px;
            border-bottom: 3px solid #1e293b;
            margin: 0 4px;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div class="hud-panel">
            <div style="font-size: 10px; color: #64748b; letter-spacing: 1px;">TOTAL SCORE</div>
            <div id="score-value">000,000</div>
        </div>
        <div class="hud-panel" style="min-width: 120px;">
            <div id="combo-mult">x1</div>
            <div id="combo-pts" style="font-size: 13px; color: #ffd700;">+0 pts</div>
        </div>
    </div>

    <div id="enemy-counter" class="bottom-ui">UNITÀ ATTIVE: 0</div>
    <div id="intensity-gauge" class="bottom-ui">FREQUENZA SPAWN: 10.0s</div>

    <!-- Interfaccia Pulsanti Mobile -->
    <div id="mobile-controls">
        <div id="btn-left" class="ctrl-btn">◀</div>
        <div id="btn-handbrake" class="ctrl-btn">DRIFT</div>
        <div id="btn-right" class="ctrl-btn">▶</div>
    </div>

    <div id="game-over-screen">
        <h1 id="death-title">SBRICIOLATO</h1>
        <p id="death-reason">Impatto ad alta velocità.</p>
        <button class="restart-btn" onclick="resetGame()">TOCCA QUI O PREMI <span class="tip-key">SPAZIO</span> PER RICOMINCIARE</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        class InputHandler {
            constructor() {
                this.states = { left: false, right: false, handbrake: false };
                this.map = {
                    'a': 'left', 'arrowleft': 'left',
                    'd': 'right', 'arrowright': 'right',
                    ' ': 'handbrake'
                };
                
                // Keyboard events
                window.addEventListener('keydown', (e) => {
                    if (isGameOver && e.key === ' ') {
                        e.preventDefault();
                        resetGame();
                        return;
                    }
                    this.toggle(e, true);
                });
                window.addEventListener('keyup', (e) => this.toggle(e, false));

                // Touch events per Mobile UI
                this.initTouchControls();
            }

            toggle(e, status) {
                const key = e.key.toLowerCase();
                if (this.map[key]) {
                    if (key === ' ') e.preventDefault();
                    this.states[this.map[key]] = status;
                }
            }

            initTouchControls() {
                const btnLeft = document.getElementById('btn-left');
                const btnRight = document.getElementById('btn-right');
                const btnBrake = document.getElementById('btn-handbrake');

                if (!btnLeft || !btnRight || !btnBrake) return;

                const bindTouch = (element, stateProperty) => {
                    element.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        this.states[stateProperty] = true;
                    }, { passive: false });

                    element.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        this.states[stateProperty] = false;
                    }, { passive: false });
                };

                bindTouch(btnLeft, 'left');
                bindTouch(btnRight, 'right');
                bindTouch(btnBrake, 'handbrake');
            }

            clear() { for (let k in this.states) this.states[k] = false; }
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const inputs = new InputHandler();

        const MAP_WIDTH = 3000;
        const MAP_HEIGHT = 3000;
        const BORDER_WALL_THICKNESS = 20; 

        let player, enemies, tireTracks;
        let staticWalls = []; 
        let staticTrees = []; 
        let staticOilSlicks = []; 
        let score, comboPoints, multiplier, driftTimer, isDrifting, isGameOver;
        let survivalTime, spawnAccumulator, survivalScoreTimer;
        let camera = { x: 0, y: 0 };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function checkCircleRectCollision(cx, cy, radius, rx, ry, rw, rh) {
            let closestX = Math.max(rx, Math.min(cx, rx + rw));
            let closestY = Math.max(ry, Math.min(cy, ry + rh));
            let distX = cx - closestX;
            let distY = cy - closestY;
            return (distX * distX + distY * distY) < (radius * radius);
        }

        function initGame() {
            player = {
                x: MAP_WIDTH / 2,
                y: MAP_HEIGHT / 2,
                vx: 0, vy: 0,
                speed: 235,
                angle: -Math.PI / 2,
                radius: 8,
                grip: 0.94,
                oilTimer: 0,      
                handbrakeTimer: 0  
            };

            enemies = [];
            tireTracks = [];
            staticWalls = [];
            staticTrees = [];
            staticOilSlicks = []; 
            
            survivalTime = 0;
            spawnAccumulator = 0;
            survivalScoreTimer = 0; 

            for(let i = 0; i < 24; i++) {
                let x = Math.random() * (MAP_WIDTH - 300) + 150;
                let y = Math.random() * (MAP_HEIGHT - 300) + 150;
                let r = Math.random() * 35 + 30; 
                if (Math.hypot(x - player.x, y - player.y) < 250) {
                    i--; continue;
                }
                staticOilSlicks.push({ x, y, r });
            }

            for(let i = 0; i < 18; i++) {
                let w = Math.random() * 140 + 60;
                let h = Math.random() * 140 + 60;
                let x = Math.random() * (MAP_WIDTH - w - 200) + 100;
                let y = Math.random() * (MAP_HEIGHT - h - 200) + 100;
                if (Math.hypot(x + w/2 - player.x, y + h/2 - player.y) < 300) {
                    i--; continue;
                }
                staticWalls.push({ x, y, w, h });
            }

            for(let i = 0; i < 6; i++) {
                let r = Math.random() * 10 + 16; 
                let x = Math.random() * (MAP_WIDTH - 300) + 150;
                let y = Math.random() * (MAP_HEIGHT - 300) + 150;
                if (Math.hypot(x - player.x, y - player.y) < 300) {
                    i--; continue;
                }
                staticTrees.push({ x, y, r });
            }

            spawnEnemy();

            score = 0;
            comboPoints = 0;
            multiplier = 1;
            driftTimer = 0;
            isDrifting = false;
            isGameOver = false;
            inputs.clear();

            document.getElementById('score-value').innerText = "000,000";
            document.getElementById('game-over-screen').style.display = 'none';
        }

        function spawnEnemy() {
            const types = ['police', 'ambulance', 'tow_truck', 'black_car', 'drunk'];
            const chosenType = types[Math.floor(Math.random() * types.length)];

            const spawnRadius = Math.max(canvas.width, canvas.height) * 0.6;
            const randomAngle = Math.random() * Math.PI * 2;
            
            let sx = player.x + Math.cos(randomAngle) * spawnRadius;
            let sy = player.y + Math.sin(randomAngle) * spawnRadius;
            
            sx = Math.max(BORDER_WALL_THICKNESS + 20, Math.min(MAP_WIDTH - BORDER_WALL_THICKNESS - 20, sx));
            sy = Math.max(BORDER_WALL_THICKNESS + 20, Math.min(MAP_HEIGHT - BORDER_WALL_THICKNESS - 20, sy));

            let config = {
                type: chosenType,
                x: sx, y: sy,
                vx: 0, vy: 0,
                angle: Math.random() * Math.PI * 2,
                isDead: false,
                strokePhase: Math.random() * 100,
                oilTimer: 0 
            };

            switch(chosenType) {
                case 'police':
                    config.speed = 255;   config.grip = 0.91;   config.steerMod = 3.8; config.radius = 8;  config.name = "Polizia";
                    break;
                case 'ambulance':
                    config.speed = 205;   config.grip = 0.82;   config.steerMod = 2.3; config.radius = 10; config.name = "Ambulanza";
                    break;
                case 'tow_truck':
                    config.speed = 140;   config.grip = 0.98;   config.steerMod = 4.3; config.radius = 11; config.name = "Carro Attrezzi";
                    break;
                case 'black_car':
                    config.speed = 190;   config.grip = 0.76;   config.steerMod = 3.8; config.radius = 8;  config.name = "Auto Nera";
                    break;
                case 'drunk':
                    config.speed = 245;   config.grip = 0.78;   config.steerMod = 3.2; config.radius = 8;  config.name = "Auto Ubriaca";
                    config.drunkTimer = Math.random() * 50;
                    break;
            }

            enemies.push(config);
        }

        function updatePhysics(dt) {
            if (isGameOver) return;

            survivalScoreTimer += dt;
            if (survivalScoreTimer >= 1.0) {
                score += 500;
                survivalScoreTimer -= 1.0;
                document.getElementById('score-value').innerText = score.toLocaleString('en-US', { minimumIntegerDigits: 6 });
            }

            survivalTime += dt;
            let progress = Math.min(1.0, survivalTime / 60.0);
            let currentSpawnInterval = 10.0 - (progress * 9.0);

            document.getElementById('intensity-gauge').innerText = `FREQUENZA SPAWN: ${currentSpawnInterval.toFixed(1)}s`;

            spawnAccumulator += dt;
            if (spawnAccumulator >= currentSpawnInterval) {
                spawnEnemy();
                spawnAccumulator = 0;
            }

            const activeCount = enemies.filter(e => !e.isDead).length;
            document.getElementById('enemy-counter').innerText = `UNITÀ INFESTANTI: ${activeCount}`;

            let steerSpeed = 4.0;
            if (inputs.states.left) player.angle -= steerSpeed * dt;
            if (inputs.states.right) player.angle += steerSpeed * dt;

            let pTargetVx = Math.cos(player.angle) * player.speed;
            let pTargetVy = Math.sin(player.angle) * player.speed;
            
            let playerInOil = false;
            for (let oil of staticOilSlicks) {
                if (Math.hypot(player.x - oil.x, player.y - oil.y) < oil.r) {
                    playerInOil = true;
                    break;
                }
            }

            if (playerInOil) {
                player.oilTimer = 5.0;
            } else if (player.oilTimer > 0) {
                player.oilTimer -= dt;
                if (player.oilTimer < 0) player.oilTimer = 0;
            }

            if (inputs.states.handbrake) {
                player.handbrakeTimer = 2.0;
            } else if (player.handbrakeTimer > 0) {
                player.handbrakeTimer -= dt;
                if (player.handbrakeTimer < 0) player.handbrakeTimer = 0;
            }

            let handbrakeGripMod = 1.0;
            if (player.handbrakeTimer > 0) {
                let tHandbrake = player.handbrakeTimer / 2.0; 
                handbrakeGripMod = inputs.states.handbrake ? 0.12 : 0.12 + (1.0 - 0.12) * (1.0 - tHandbrake);
            }

            let oilGripMod = 1.0;
            if (player.oilTimer > 0) {
                let tOil = player.oilTimer / 5.0; 
                oilGripMod = playerInOil ? 0.15 : 0.15 + (1.0 - 0.15) * (1.0 - tOil);
            }

            let pCurrentGrip = player.grip * handbrakeGripMod * oilGripMod;

            player.vx += (pTargetVx - player.vx) * pCurrentGrip * 5 * dt;
            player.vy += (pTargetVy - player.vy) * pCurrentGrip * 5 * dt;
            player.x += player.vx * dt;
            player.y += player.vy * dt;

            const minPlayX = BORDER_WALL_THICKNESS + player.radius;
            const maxPlayX = MAP_WIDTH - BORDER_WALL_THICKNESS - player.radius;
            const minPlayY = BORDER_WALL_THICKNESS + player.radius;
            const maxPlayY = MAP_HEIGHT - BORDER_WALL_THICKNESS - player.radius;

            if (player.x < minPlayX || player.x > maxPlayX || player.y < minPlayY || player.y > maxPlayY) {
                triggerGameOver("💥 PERIMETRO CRUCIALE", "Hai disintegrato la AE86 contro le barriere esterne!");
                return;
            }

            for (let wall of staticWalls) {
                if (checkCircleRectCollision(player.x, player.y, player.radius, wall.x, wall.y, wall.w, wall.h)) {
                    triggerGameOver("🧱 BLOCCO CANTIERE", "Impatto irreversibile contro le protezioni in cemento armato!");
                    return;
                }
            }
            for (let tree of staticTrees) {
                if (Math.hypot(player.x - tree.x, player.y - tree.y) < (player.radius + tree.r - 4)) {
                    triggerGameOver("🌲 TRONCO RIGIDO", "La carrozzeria Panda si è avvolta fatalmente intorno a un albero!");
                    return;
                }
            }

            let pSlip = Math.hypot(player.vx - pTargetVx, player.vy - pTargetVy);
            if (pSlip > 65 || player.handbrakeTimer > 0 || player.oilTimer > 0) {
                let trackColor = player.oilTimer > 0 ? 'rgba(0, 180, 255, ' : 'rgba(255, 255, 255, ';
                tireTracks.push({ x: player.x, y: player.y, alpha: 1.0, color: trackColor });
            }

            if (pSlip > 80 || ((player.oilTimer > 0 || player.handbrakeTimer > 0) && Math.hypot(player.vx, player.vy) > 30)) {
                if (!isDrifting) isDrifting = true;
                driftTimer += dt;
                let pointsPerSecond = player.oilTimer > 0 ? 450 : 250;
                comboPoints += pointsPerSecond * dt;
                multiplier = 1 + Math.floor(driftTimer / 1.0);
                document.getElementById('combo-mult').innerText = `x${multiplier}`;
                document.getElementById('combo-pts').innerText = `+${Math.round(comboPoints)} pts`;
            } else {
                cashInCombo();
            }

            for (let i = 0; i < enemies.length; i++) {
                let e = enemies[i];
                if (e.isDead) continue;

                let angleToPlayer = Math.atan2(player.y - e.y, player.x - e.x);
                
                if (e.type === 'drunk') {
                    e.drunkTimer += dt * 5;
                    angleToPlayer += Math.sin(e.drunkTimer) * 0.65 + (Math.random() - 0.5) * 0.25;
                }

                let angleDiff = Math.atan2(Math.sin(angleToPlayer - e.angle), Math.cos(angleToPlayer - e.angle));
                e.angle += angleDiff * e.steerMod * dt;

                let eTargetVx = Math.cos(e.angle) * e.speed;
                let eTargetVy = Math.sin(e.angle) * e.speed;

                let enemyInOil = false;
                for (let oil of staticOilSlicks) {
                    if (Math.hypot(e.x - oil.x, e.y - oil.y) < oil.r) {
                        enemyInOil = true;
                        break;
                    }
                }

                if (enemyInOil) {
                    e.oilTimer = 5.0;
                } else if (e.oilTimer > 0) {
                    e.oilTimer -= dt;
                    if (e.oilTimer < 0) e.oilTimer = 0;
                }

                let eOilGripMod = 1.0;
                if (e.oilTimer > 0) {
                    let tEOil = e.oilTimer / 5.0;
                    eOilGripMod = enemyInOil ? 0.18 : 0.18 + (1.0 - 0.18) * (1.0 - tEOil);
                }

                let currentEGrip = e.grip * eOilGripMod;

                e.vx += (eTargetVx - e.vx) * currentEGrip * 4 * dt;
                e.vy += (eTargetVy - e.vy) * currentEGrip * 4 * dt;
                e.x += e.vx * dt;
                e.y += e.vy * dt;

                if (e.x < (BORDER_WALL_THICKNESS + e.radius) || e.x > (MAP_WIDTH - BORDER_WALL_THICKNESS - e.radius) ||
                    e.y < (BORDER_WALL_THICKNESS + e.radius) || e.y > (MAP_HEIGHT - BORDER_WALL_THICKNESS - e.radius)) {
                    e.isDead = true; 
                }

                for (let wall of staticWalls) {
                    if (checkCircleRectCollision(e.x, e.y, e.radius, wall.x, wall.y, wall.w, wall.h)) e.isDead = true;
                }
                for (let tree of staticTrees) {
                    if (Math.hypot(e.x - tree.x, e.y - tree.y) < (e.radius + tree.r)) e.isDead = true;
                }

                if (Math.hypot(e.vx - eTargetVx, e.vy - eTargetVy) > 40 || e.oilTimer > 0) {
                    let trackColor = 'rgba(255, 0, 85, ';
                    if (e.type === 'ambulance') trackColor = 'rgba(0, 150, 255, ';
                    else if (e.type === 'drunk') trackColor = 'rgba(245, 158, 11, '; 
                    tireTracks.push({ x: e.x, y: e.y, alpha: 0.4, color: trackColor });
                }

                for (let j = 0; j < enemies.length; j++) {
                    if (i === j) continue;
                    let target = enemies[j];
                    if (Math.hypot(e.x - target.x, e.y - target.y) < (e.radius + target.radius)) {
                        e.isDead = true; target.isDead = true; 
                    }
                }
            }

            for (let e of enemies) {
                if (Math.hypot(player.x - e.x, player.y - e.y) < (player.radius + e.radius)) {
                    if (e.isDead) {
                        triggerGameOver("💥 DETRITO METALLICO", "Hai centrato in pieno i resti incandescenti di un blocco nemico!");
                    } else {
                        triggerGameOver("🚨 SPERONATO", `La corsa della AE86 è stata bloccata da: ${e.name.toUpperCase()}`);
                    }
                }
            }

            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;
            camera.x = Math.max(0, Math.min(MAP_WIDTH - canvas.width, camera.x));
            camera.y = Math.max(0, Math.min(MAP_HEIGHT - canvas.height, camera.y));
        }

        function cashInCombo() {
            if (isDrifting) {
                isDrifting = false;
                score += Math.round(comboPoints * multiplier);
                document.getElementById('score-value').innerText = score.toLocaleString('en-US', { minimumIntegerDigits: 6 });
                driftTimer = 0; comboPoints = 0; multiplier = 1;
                document.getElementById('combo-mult').innerText = `x1`;
                document.getElementById('combo-pts').innerText = `+0 pts`;
            }
        }

        function triggerGameOver(title, message) {
            isGameOver = true;
            cashInCombo();
            document.getElementById('death-title').innerText = title;
            document.getElementById('death-reason').innerText = message;
            document.getElementById('game-over-screen').style.display = 'flex';
        }

        function resetGame() { initGame(); }

        function drawCarWheels(ctx, w, h) {
            ctx.fillStyle = '#111116';
            ctx.fillRect(-w + 2, -h - 1.5, 5, 2.2);
            ctx.fillRect(-w + 2, h - 0.7, 5, 2.2);
            ctx.fillRect(w - 7, -h - 1.5, 5, 2.2);
            ctx.fillRect(w - 7, h - 0.7, 5, 2.2);
        }

        let lastTime = performance.now();

        function renderLoop(currentTime) {
            let dt = (currentTime - lastTime) / 1000;
            lastTime = currentTime;
            if (dt > 0.1) dt = 0.1;

            updatePhysics(dt);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            ctx.strokeStyle = '#08080d';
            ctx.lineWidth = 1;
            const gridSpacing = 60;
            for (let i = 0; i <= MAP_WIDTH; i += gridSpacing) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, MAP_HEIGHT); ctx.stroke();
            }
            for (let j = 0; j <= MAP_HEIGHT; j += gridSpacing) {
                ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(MAP_WIDTH, j); ctx.stroke();
            }

            for (let oil of staticOilSlicks) {
                ctx.fillStyle = 'rgba(15, 5, 23, 0.85)';
                ctx.strokeStyle = 'rgba(140, 0, 255, 0.35)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(oil.x, oil.y, oil.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                ctx.fillStyle = 'rgba(0, 255, 170, 0.08)';
                ctx.beginPath();
                ctx.arc(oil.x - oil.r * 0.25, oil.y - oil.r * 0.25, oil.r * 0.45, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'rgba(255, 215, 0, 0.04)';
                ctx.beginPath();
                ctx.arc(oil.x + oil.r * 0.3, oil.y + oil.r * 0.1, oil.r * 0.3, 0, Math.PI * 2);
                ctx.fill();
            }

            for (let i = tireTracks.length - 1; i >= 0; i--) {
                let track = tireTracks[i];
                track.alpha -= 0.32 * dt;
                if (track.alpha <= 0) { tireTracks.splice(i, 1); continue; }
                ctx.fillStyle = `${track.color}${track.alpha * 0.4})`;
                ctx.fillRect(track.x, track.y, 2.5, 2.5);
            }

            for (let wall of staticWalls) {
                ctx.fillStyle = '#fac800';
                ctx.fillRect(wall.x, wall.y, wall.w, wall.h);

                ctx.save();
                ctx.beginPath();
                ctx.rect(wall.x, wall.y, wall.w, wall.h);
                ctx.clip(); 

                ctx.strokeStyle = '#111116';
                ctx.lineWidth = 8;
                for (let offset = -wall.h; offset < wall.w; offset += 24) {
                    ctx.beginPath();
                    ctx.moveTo(wall.x + offset, wall.y);
                    ctx.lineTo(wall.x + offset + wall.h, wall.y + wall.h);
                    ctx.stroke();
                }
                ctx.restore();

                ctx.strokeStyle = '#d4a000';
                ctx.lineWidth = 2;
                ctx.strokeRect(wall.x, wall.y, wall.w, wall.h);
            }

            for (let tree of staticTrees) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                ctx.beginPath(); ctx.arc(tree.x + 4, tree.y + 4, tree.r, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#1c2421';
                ctx.strokeStyle = '#344740';
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(tree.x, tree.y, tree.r, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#0b0f0d';
                ctx.beginPath(); ctx.arc(tree.x, tree.y, 4, 0, Math.PI*2); ctx.fill();
            }

            ctx.fillStyle = '#020204';
            ctx.fillRect(0, 0, MAP_WIDTH, BORDER_WALL_THICKNESS);
            ctx.fillRect(0, MAP_HEIGHT - BORDER_WALL_THICKNESS, MAP_WIDTH, BORDER_WALL_THICKNESS);
            ctx.fillRect(0, 0, BORDER_WALL_THICKNESS, MAP_HEIGHT);
            ctx.fillRect(MAP_WIDTH - BORDER_WALL_THICKNESS, 0, BORDER_WALL_THICKNESS, MAP_HEIGHT);

            ctx.strokeStyle = '#3e3e52';
            ctx.lineWidth = 3;
            ctx.strokeRect(BORDER_WALL_THICKNESS, BORDER_WALL_THICKNESS, MAP_WIDTH - BORDER_WALL_THICKNESS * 2, MAP_HEIGHT - BORDER_WALL_THICKNESS * 2);

            ctx.strokeStyle = 'var(--accent-danger)';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(BORDER_WALL_THICKNESS - 1, BORDER_WALL_THICKNESS - 1, MAP_WIDTH - (BORDER_WALL_THICKNESS - 1) * 2, MAP_HEIGHT - (BORDER_WALL_THICKNESS - 1) * 2);

            ctx.fillStyle = '#565673';
            for (let x = 0; x <= MAP_WIDTH; x += 80) {
                ctx.fillRect(x - 3, BORDER_WALL_THICKNESS - 3, 6, 6);
                ctx.fillRect(x - 3, MAP_HEIGHT - BORDER_WALL_THICKNESS - 3, 6, 6);
            }
            for (let y = 0; y <= MAP_HEIGHT; y += 80) {
                ctx.fillRect(BORDER_WALL_THICKNESS - 3, y - 3, 6, 6);
                ctx.fillRect(MAP_WIDTH - BORDER_WALL_THICKNESS - 3, y - 3, 6, 6);
            }

            for (let e of enemies) {
                ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(e.angle);
                if (e.isDead) {
                    ctx.fillStyle = '#ff3300'; 
                    ctx.fillRect(-e.radius * 1.3, -e.radius * 0.8, e.radius * 2.6, e.radius * 1.6);
                    ctx.strokeStyle = '#ffcc00'; 
                    ctx.lineWidth = 2;
                    ctx.strokeRect(-e.radius * 1.3, -e.radius * 0.8, e.radius * 2.6, e.radius * 1.6);
                } else {
                    e.strokePhase += dt * 15;
                    const isStrobeOn = Math.floor(e.strokePhase) % 2 === 0;
                    
                    drawCarWheels(ctx, 12, 6);

                    switch(e.type) {
                        case 'police':
                            ctx.fillStyle = '#1e1e24'; ctx.fillRect(-12, -6, 24, 12);
                            ctx.fillStyle = '#ffffff'; ctx.fillRect(-4, -6, 12, 12); 
                            ctx.fillStyle = '#475569'; ctx.fillRect(-2, -4, 5, 8);
                            ctx.fillStyle = isStrobeOn ? '#0066ff' : '#ff0000'; ctx.fillRect(-1, -1.5, 3, 3);
                            ctx.fillStyle = '#fffae6'; ctx.fillRect(11, -5, 1, 2); ctx.fillRect(11, 3, 1, 2);
                            break;
                        case 'ambulance':
                            ctx.fillStyle = '#f8fafc'; ctx.fillRect(-15, -8, 30, 16);
                            ctx.fillStyle = '#ef4444'; ctx.fillRect(-15, -8, 30, 2); ctx.fillRect(-15, 6, 30, 2);
                            ctx.fillStyle = '#1e293b'; ctx.fillRect(4, -6, 4, 12);
                            ctx.fillStyle = isStrobeOn ? '#00ffff' : 'rgba(0,0,0,0)'; ctx.fillRect(5, -2, 3, 4);
                            break;
                        case 'tow_truck':
                            ctx.fillStyle = '#ea580c'; ctx.fillRect(-16, -9, 32, 18);
                            ctx.fillStyle = '#334155'; ctx.fillRect(2, -7, 6, 14);
                            ctx.strokeStyle = '#475569'; ctx.lineWidth = 2;
                            ctx.beginPath(); ctx.moveTo(-6, 0); ctx.lineTo(-18, 0); ctx.stroke();
                            ctx.fillStyle = isStrobeOn ? '#eab308' : '#78350f'; ctx.fillRect(4, -1.5, 3, 3);
                            break;
                        case 'black_car':
                            ctx.fillStyle = '#0f0f13'; ctx.fillRect(-12, -6, 24, 12);
                            ctx.fillStyle = '#1e293b'; ctx.fillRect(-3, -4.5, 6, 9);
                            ctx.strokeStyle = '#06b6d4'; ctx.lineWidth = 1; ctx.strokeRect(-12, -6, 24, 12);
                            ctx.fillStyle = '#a5f3fc'; ctx.fillRect(11, -5, 1, 1.5); ctx.fillRect(11, 3.5, 1, 1.5);
                            break;
                        case 'drunk':
                            ctx.fillStyle = '#581c24'; ctx.fillRect(-12, -6, 24, 12);
                            ctx.fillStyle = '#1e293b'; ctx.fillRect(-3, -4.5, 6, 9);
                            ctx.strokeStyle = '#991b1b'; ctx.lineWidth = 1.5; ctx.strokeRect(-12, -6, 24, 12);
                            ctx.fillStyle = isStrobeOn ? '#f59e0b' : '#451a03';
                            ctx.fillRect(11, -5, 1, 1.5);   ctx.fillRect(11, 3.5, 1, 1.5);
                            ctx.fillRect(-12, -5, 1, 1.5);  ctx.fillRect(-12, 3.5, 1, 1.5);
                            break;
                    }
                }
                ctx.restore();
            }

            ctx.save();
            ctx.translate(player.x, player.y); 
            ctx.rotate(player.angle);

            drawCarWheels(ctx, 12, 6);

            ctx.fillStyle = '#111116';
            ctx.fillRect(1, -7.5, 1.8, 1.5);
            ctx.fillRect(1, 6, 1.8, 1.5);

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(-12, -6, 24, 12);

            ctx.fillStyle = '#111116';
            ctx.fillRect(-12, -6, 24, 1.8); 
            ctx.fillRect(-12, 4.2, 24, 1.8); 
            ctx.fillRect(-12, -6, 2, 12); 

            ctx.fillRect(4, -4.2, 8, 8.4);

            ctx.fillStyle = '#1e293b';
            ctx.fillRect(-5, -4.2, 7, 8.4); 
            ctx.fillStyle = '#ffffff'; 
            ctx.fillRect(-3, -3, 4, 6);     

            ctx.fillStyle = '#111116';
            ctx.fillRect(-5, -3.5, 1.5, 7);

            ctx.fillStyle = '#fef08a';
            ctx.fillRect(11, -3.8, 1, 1.8);
            ctx.fillRect(11, 2, 1, 1.8);

            ctx.fillStyle = '#ef4444';
            ctx.fillRect(-12, -5, 0.8, 1.5);
            ctx.fillRect(-12, 3.5, 0.8, 1.5);

            ctx.restore();
            ctx.restore();

            requestAnimationFrame(renderLoop);
        }

        initGame();
        requestAnimationFrame(renderLoop);
    </script>
</body>
</html>
