<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💼 Calcolatore NASpI 2026</title>

    <!-- Tailwind CSS & React Core via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <style>
        .slider-container {
            position: relative;
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 9999px;
            cursor: pointer;
        }

        .slider-fill {
            position: absolute;
            height: 100%;
            background: #2563eb;
            border-radius: 9999px;
            pointer-events: none;
        }

        .slider-thumb {
            position: absolute;
            top: 50%;
            width: 20px;
            height: 20px;
            background: white;
            border: 2px solid #2563eb;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: grab;
            transition: box-shadow 0.15s;
            pointer-events: auto;
        }

        .slider-thumb:hover {
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
        }

        .slider-thumb:active {
            cursor: grabbing;
        }

        body {
            background-color: #f8fafc;
        }

        .custom-input {
            border: 2px solid transparent;
            border-bottom: 2px dashed #9ca3af;
            background: transparent;
            text-align: center;
            font-weight: inherit;
            font-size: inherit;
            color: inherit;
            padding: 0 4px;
            outline: none;
            transition: border-color 0.2s, background-color 0.2s;
            min-width: 65px;
        }

        .custom-input:focus {
            border-bottom-color: #2563eb;
            background-color: rgba(37, 99, 235, 0.05);
            border-radius: 4px;
        }

        .custom-input-blu:focus {
            border-bottom-color: #2563eb;
        }

        .custom-input-verde:focus {
            border-bottom-color: #16a34a;
        }

        .custom-input-arancio:focus {
            border-bottom-color: #ea580c;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script>
        const e = React.createElement;
        const { useState, useRef, useCallback } = React;

        function formattaNumero(num, decimali) {
            if (decimali === undefined) decimali = 2;
            var arrotondato = parseFloat(Number(num).toFixed(decimali));
            var parti = arrotondato.toString().split('.');
            var parteIntera = parti[0].replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
            if (decimali > 0 && parti[1] !== undefined) {
                return parteIntera + ',' + (parti[1].length < decimali ? parti[1].padEnd(decimali, '0') : parti[1]);
            } else if (decimali > 0) {
                return parteIntera + ',' + '0'.repeat(decimali);
            }
            return parteIntera;
        }

        function Slider(props) {
            var min = props.min !== undefined ? props.min : 0;
            var max = props.max !== undefined ? props.max : 100;
            var step = props.step !== undefined ? props.step : 1;
            var value = props.value;
            var onValueChange = props.onValueChange;
            var fillClass = props.fillClass || "";

            var containerRef = useRef(null);
            var isDragging = useRef(false);
            var val = Array.isArray(value) ? value[0] : value;
            var percentage = ((val - min) / (max - min)) * 100;

            var updateValue = useCallback(function (clientX) {
                if (!containerRef.current) return;
                var rect = containerRef.current.getBoundingClientRect();
                var x = clientX - rect.left;
                var p = Math.max(0, Math.min(1, x / rect.width));
                var newValue = min + p * (max - min);
                newValue = Math.round(newValue / step) * step;
                newValue = Math.max(min, Math.min(max, newValue));
                onValueChange([newValue]);
            }, [min, max, step, onValueChange]);

            function handleMouseDown(ev) {
                isDragging.current = true;
                updateValue(ev.clientX);
                var move = function (ev) { if (isDragging.current) updateValue(ev.clientX); };
                var up = function () {
                    isDragging.current = false;
                    document.removeEventListener('mousemove', move);
                    document.removeEventListener('mouseup', up);
                };
                document.addEventListener('mousemove', move);
                document.addEventListener('mouseup', up);
            }

            function handleTouchStart(ev) {
                updateValue(ev.touches[0].clientX);
                var move = function (ev) { updateValue(ev.touches[0].clientX); };
                var end = function () {
                    document.removeEventListener('touchmove', move);
                    document.removeEventListener('touchend', end);
                };
                document.addEventListener('touchmove', move);
                document.addEventListener('touchend', end);
            }

            return e("div", { className: "space-y-2" },
                e("div", {
                    ref: containerRef,
                    className: "slider-container",
                    onMouseDown: handleMouseDown,
                    onTouchStart: handleTouchStart
                },
                    e("div", { className: "slider-fill " + fillClass, style: { width: percentage + "%" } }),
                    e("div", { className: "slider-thumb", style: { left: percentage + "%", borderColor: fillClass ? 'transparent' : '' } })
                )
            );
        }

        function Card(props) {
            return e("div", {
                className: "rounded-xl border border-slate-200 bg-white shadow-sm overflow-hidden " + (props.className || "")
            }, props.children);
        }

        function CardContent(props) {
            return e("div", {
                className: "p-6 md:p-8 " + (props.className || "")
            }, props.children);
        }

        function NaspiCalculatorApp() {
            const soglia2026 = 1456.72;
            const massimale2026 = 1584.70;

            var [imponibile, setImponibile] = useState(25000);
            var [settimane, setSettimane] = useState(52);
            var [eta, setEta] = useState(30);

            // Controllo Requisito Minimo Assoluto (Minimo 13 settimane negli ultimi 4 anni)
            var haDiritto = settimane >= 13;

            // 1. Calcolo Retribuzione Media Mensile (attivo solo se ha diritto)
            var retribuzioneMedia = (settimane > 0 && haDiritto) ? (imponibile / settimane) * 4.33 : 0;

            // 2. Calcolo Importo Base e applicazione del Tetto Massimale
            var importoBase = 0;
            if (haDiritto) {
                if (retribuzioneMedia <= soglia2026) {
                    importoBase = retribuzioneMedia * 0.75;
                } else {
                    importoBase = (soglia2026 * 0.75) + ((retribuzioneMedia - soglia2026) * 0.25);
                }

                if (importoBase > massimale2026) {
                    importoBase = massimale2026;
                }
            }

            // Calcolo Netto Puro del Primo Mese intero
            var irpefPrimoMese = importoBase * 0.23;
            var importoBaseNetto = importoBase - irpefPrimoMese;

            // 3. Conversione Rigorosa in Giorni (1 settimana = 7 giorni di prestazione)
            var durataSettimane = haDiritto ? Math.floor(settimane / 2) : 0;
            var totaleGiorniIndennizzati = durataSettimane * 7;

            // 4. Elaborazione del Ledger Giornaliero/Mensile dei Pagamenti
            var giorniResidui = totaleGiorniIndennizzati;
            var tabellaMesi = [];
            var totaleSommaMesi = 0;
            var totaleSommaMesiNetta = 0;
            var importoCorrente = importoBase;
            var m = 1;

            if (haDiritto) {
                while (giorniResidui > 0) {
                    if (eta < 55) {
                        if (m >= 6) importoCorrente *= 0.97;
                    } else {
                        if (m >= 8) importoCorrente *= 0.97;
                    }

                    var giorniMeseCorrente = Math.min(30, giorniResidui);
                    var importoEffettivoMese = 0;

                    if (giorniMeseCorrente === 30) {
                        importoEffettivoMese = importoCorrente;
                    } else {
                        importoEffettivoMese = (importoCorrente / 30) * giorniMeseCorrente;
                    }

                    var irpefMese = importoEffettivoMese * 0.23;
                    var importoNettoMese = importoEffettivoMese - irpefMese;

                    totaleSommaMesi += importoEffettivoMese;
                    totaleSommaMesiNetta += importoNettoMese;

                    tabellaMesi.push({
                        mese: m,
                        giorniPagati: giorniMeseCorrente,
                        importoMensileLordo: importoCorrente,
                        importoErogato: importoEffettivoMese,
                        importoNettoErogato: importoNettoMese,
                        haRiduzione: (eta < 55 && m >= 6) || (eta >= 55 && m >= 8)
                    });

                    giorniResidui -= giorniMeseCorrente;
                    m++;
                }
            }

            // Estrazione dell'ultimo mese per isolare il calcolo se è parziale
            var ultimoMese = tabellaMesi.length > 0 ? tabellaMesi[tabellaMesi.length - 1] : null;
            var ultimoMeseParziale = ultimoMese && ultimoMese.giorniPagati < 30;

            return e("div", { className: "p-4 md:p-8 max-w-5xl mx-auto space-y-8 font-sans" },

                /* INTESTAZIONE */
                e("div", { className: "text-center space-y-2 pt-4" },
                    e("h1", { className: "text-3xl md:text-4xl font-black text-slate-900 tracking-tight" },
                        "💼 Calcolatore NASpI 2026"
                    ),
                    e("p", { className: "text-sm text-slate-500 font-medium" },
                        "Quanto prenderai?"
                    )
                ),

                /* FRASE CENTRALE INTERATTIVA */
                e(Card, { className: "border-blue-100 bg-gradient-to-br from-white to-slate-50/50 shadow-md" },
                    e(CardContent, { className: "p-8 md:p-10" },
                        e("div", { className: "text-center space-y-6" },
                            e("div", { className: "text-xl md:text-2xl font-normal leading-relaxed text-slate-700" },
                                "Negli ultimi 4 anni hai accumulato un imponibile previdenziale* di ",
                                e("input", {
                                    type: "number",
                                    value: imponibile,
                                    onChange: function (ev) { setImponibile(parseFloat(ev.target.value) || 0); },
                                    className: "custom-input custom-input-blu font-bold text-blue-600 w-36",
                                    min: "0"
                                }),
                                " € su un totale di ",
                                e("input", {
                                    type: "number",
                                    value: settimane,
                                    onChange: function (ev) { setSettimane(Math.min(208, parseInt(ev.target.value) || 0)); },
                                    className: "custom-input custom-input-verde font-bold text-green-600 w-20",
                                    max: "208",
                                    min: "0"
                                }),
                                " settimane contributive.",
                                e("br"),
                                "All'inizio della disoccupazione hai ",
                                e("input", {
                                    type: "number",
                                    value: eta,
                                    onChange: function (ev) { setEta(parseInt(ev.target.value) || 0); },
                                    className: "custom-input custom-input-arancio font-bold text-orange-600 w-16",
                                    min: "1"
                                }),
                                " anni."
                            ),
                            e("div", { className: "text-xs font-semibold uppercase tracking-wider text-slate-400" },
                                "💡 Modifica i valori sottolineati o usa gli slider in basso per aggiornare i calcoli in tempo reale"
                            )
                        )
                    )
                ),

                /* PANNELLO SLIDER */
                e(Card, { className: "shadow-sm" },
                    e(CardContent, { className: "space-y-6" },
                        e("h3", { className: "text-sm font-bold uppercase tracking-wider text-slate-400 mb-2" }, "Regolatori rapidi di input"),

                        e("div", { className: "space-y-2" },
                            e("div", { className: "flex justify-between text-sm" },
                                e("span", { className: "text-slate-600 font-medium" }, "💰 Imponibile Previdenziale Totale (4 anni)"),
                                e("span", { className: "font-bold text-blue-600 text-base" }, "€ " + formattaNumero(imponibile, 0))
                            ),
                            e(Slider, {
                                min: 0, max: 160000, step: 250,
                                value: [imponibile],
                                onValueChange: function (v) { setImponibile(v[0]); },
                                fillClass: "bg-blue-600"
                            })
                        ),

                        e("div", { className: "space-y-2" },
                            e("div", { className: "flex justify-between text-sm" },
                                e("span", { className: "text-slate-600 font-medium" }, "⏳ Settimane Contributive"),
                                e("span", { className: "font-bold text-green-600 text-base" }, settimane + " settimane")
                            ),
                            e(Slider, {
                                min: 0, max: 208, step: 1,
                                value: [settimane],
                                onValueChange: function (v) { setSettimane(v[0]); },
                                fillClass: "bg-green-600"
                            })
                        ),

                        e("div", { className: "space-y-2" },
                            e("div", { className: "flex justify-between text-sm" },
                                e("span", { className: "text-slate-600 font-medium" }, "🎂 Età Anagrafica"),
                                e("span", { className: "font-bold text-orange-600 text-base" }, eta + " anni")
                            ),
                            e(Slider, {
                                min: 18, max: 70, step: 1,
                                value: [eta],
                                onValueChange: function (v) { setEta(v[0]); },
                                fillClass: "bg-orange-600"
                            })
                        )
                    )
                ),

                /* BLOCK BANNER PER BLOCCO REQUISITO MINIMO (< 13 SETTIMANE) */
                !haDiritto && e("div", { className: "p-5 bg-rose-50 border border-rose-200 rounded-xl text-rose-900 space-y-1.5 shadow-sm" },
                    e("div", { className: "font-bold flex items-center gap-2 text-base text-rose-800" }, "🛑 Requisito Contributivo Minimo Assente"),
                    e("p", { className: "text-sm text-rose-700 leading-relaxed" },
                        "La normativa INPS stabilisce che per aver diritto alla prestazione NASpI sono necessarie almeno ",
                        e("strong", null, "13 settimane di contribuzione"),
                        " nei 4 anni precedenti l'evento di disoccupazione. Avendo impostato solo ",
                        e("span", { className: "font-bold bg-rose-200/60 px-1.5 py-0.5 rounded text-rose-950" }, settimane + " settimane"),
                        ", l'istanza verrebbe respinta e l'indennità decade totalmente a 0 €."
                    )
                ),

                /* METRICHE CHIAVE OUTPUT */
                e("div", { className: "grid grid-cols-1 md:grid-cols-3 gap-4" },

                    e(Card, { className: "border-l-4 border-l-purple-600 bg-purple-50/10" },
                        e(CardContent, { className: "p-5 text-center space-y-1" },
                            e("div", { className: "text-xs font-bold uppercase tracking-wider text-purple-600" }, "Importo Netto Totale"),
                            e("div", { className: "text-3xl font-black text-purple-700" }, "€ " + formattaNumero(totaleSommaMesiNetta, 2)),
                            e("div", { className: "text-xs text-slate-500 font-medium" }, "Lordo: € " + formattaNumero(totaleSommaMesi, 2)),
                            e("div", { className: "text-[10px] text-slate-400" }, "Somma netta effettiva mensile ante-conguaglio")
                        )
                    ),

                    e(Card, { className: "border-l-4 border-l-blue-600 bg-blue-50/10" },
                        e(CardContent, { className: "p-5 text-center space-y-1" },
                            e("div", { className: "text-xs font-bold uppercase tracking-wider text-blue-600" }, "Importo Netto Mensile"),
                            e("div", { className: "text-3xl font-black text-blue-600" }, "€ " + formattaNumero(importoBaseNetto, 2)),
                            e("div", { className: "text-xs text-slate-500 font-medium" }, "Lordo: € " + formattaNumero(importoBase, 2)),
                            e("div", { className: "text-[10px] text-slate-400" },
                                !haDiritto ? "Requisito insufficiente" : (eta < 55 ? "Importo netto per i primi 5 mesi (ante-décalage)" : "Importo netto per i primi 7 mesi (ante-décalage)")
                            )
                        )
                    ),

                    e(Card, { className: "border-l-4 border-l-green-600" },
                        e(CardContent, { className: "p-5 text-center space-y-1" },
                            e("div", { className: "text-xs font-semibold uppercase tracking-wider text-slate-500" }, "Durata Indennità"),
                            e("div", { className: "text-2xl font-bold text-slate-800" }, formattaNumero(totaleGiorniIndennizzati / 30.4167, 1) + " Mesi"),
                            e("div", { className: "text-xs font-semibold text-green-600" },
                                durataSettimane + " sett. (" + totaleGiorniIndennizzati + " gg complessivi)"
                            )
                        )
                    )
                ),
                /* DETTAGLIO FORMULA E SVOLGIMENTO */
                e(Card, { className: "bg-slate-50 border-slate-200" },
                    e(CardContent, { className: "space-y-5" },
                        e("h3", { className: "font-bold text-slate-800 text-base flex items-center gap-2" }, "🔍 Svolgimento analitico dei passaggi:"),

                        e("div", { className: "bg-white p-6 rounded-lg border border-slate-200 space-y-5 text-slate-700 font-sans" },

                            /* PASSO 1: RETRIBUZIONE MEDIA */
                            e("div", { className: "border-b border-slate-100 pb-3.5" },
                                e("div", { className: "text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5" }, "Passo 1: Retribuzione Media Mensile"),
                                e("div", { className: "flex flex-col md:flex-row md:justify-between md:items-center text-sm gap-1" },
                                    e("span", { className: "text-slate-500 font-medium" }, "Formula ordinaria: (Imponibile / Settimane) × 4,33"),
                                    e("span", { className: "font-mono text-slate-900 bg-slate-50 px-2 py-1 rounded" },
                                        !haDiritto ?
                                            e("span", { className: "text-rose-600 font-semibold animate-pulse" }, "Bloccato: settimane inferiori a 13") :
                                            e("span", null,
                                                "( " + formattaNumero(imponibile, 2) + " / " + settimane + " ) × 4,33 = ",
                                                e("span", { className: "text-blue-600 font-bold" }, "€ " + formattaNumero(retribuzioneMedia, 2))
                                            )
                                    )
                                )
                            ),

                            /* PASSO 2: CONFRONTO SOGLIA */
                            e("div", { className: "border-b border-slate-100 pb-3.5" },
                                e("div", { className: "text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5" }, "Passo 2: Calcolo dell'Importo Mensile Base (Tetti 2026)"),
                                e("div", { className: "text-sm space-y-2.5" },
                                    e("div", { className: "flex justify-between text-slate-600" },
                                        e("span", null, "Soglia limite di virata INPS 2026:"),
                                        e("span", { className: "font-semibold font-mono" }, "€ " + formattaNumero(soglia2026, 2))
                                    ),
                                    !haDiritto ?
                                        e("div", { className: "p-3 rounded-lg text-xs font-medium bg-rose-50 text-rose-800 border border-rose-100" },
                                            "Nessun importo calcolabile: diritto d'accesso non maturato."
                                        ) :
                                        retribuzioneMedia <= soglia2026 ?
                                            e("div", { className: "p-3 rounded-lg text-xs font-medium bg-green-50 text-green-800 border border-green-100 space-y-1" },
                                                e("div", null, "✓ La retribuzione media è inferiore alla soglia. Importo Base fisso = 75% della media = € " + formattaNumero(importoBase, 2)),
                                                e("div", { className: "text-slate-600 font-mono text-[11px] pt-1 border-t border-green-200/50 flex justify-between items-center" },
                                                    e("span", null, "➔ Corrispettivo Netto mensile (Lordo - 23% IRPEF):"),
                                                    e("span", { className: "font-bold text-green-700" }, "€ " + formattaNumero(importoBaseNetto, 2))
                                                )
                                            ) :
                                            (function () {
                                                var eccedenza = retribuzioneMedia - soglia2026;
                                                var qA = soglia2026 * 0.75;
                                                var qB = eccedenza * 0.25;
                                                var lordoCombinato = qA + qB;
                                                var lordoApplicato = Math.min(lordoCombinato, massimale2026);
                                                var irpefCombinata = lordoApplicato * 0.23;
                                                var nettoCombinato = lordoApplicato - irpefCombinata;
                                                return e("div", { className: "space-y-2 bg-slate-50/50 p-3 rounded-lg border border-slate-100" },
                                                    e("div", { className: "text-xs text-blue-800 font-semibold mb-1" }, "➔ Media superiore alla soglia. Ripartizione progressiva:"),
                                                    e("div", { className: "flex justify-between text-xs text-slate-600 pl-2 border-l-2 border-blue-500" },
                                                        e("span", null, "• Quota A (75% della soglia limite):"),
                                                        e("span", { className: "font-mono font-medium text-slate-900" }, "€ " + formattaNumero(qA, 2))
                                                    ),
                                                    e("div", { className: "flex justify-between text-xs text-slate-600 pl-2 border-l-2 border-blue-500" },
                                                        e("span", null, "• Quota B (25% sull'eccedenza di € " + formattaNumero(eccedenza, 2) + "):"),
                                                        e("span", { className: "font-mono font-medium text-slate-900" }, "€ " + formattaNumero(qB, 2))
                                                    ),
                                                    e("div", { className: "flex justify-between items-center font-bold text-slate-900 pt-1 text-xs" },
                                                        e("span", null, "Somma combinata Lorda:"),
                                                        e("span", { className: "font-mono text-slate-700 text-sm" }, "€ " + formattaNumero(lordoCombinato, 2))
                                                    ),
                                                    e("div", { className: "flex justify-between items-center text-slate-500 text-xs pl-2 border-l-2 border-red-400 pt-0.5" },
                                                        e("span", null, "• Trattenuta IRPEF (23%):"),
                                                        e("span", { className: "font-mono text-red-600" }, "- € " + formattaNumero(irpefCombinata, 2))
                                                    ),
                                                    e("div", { className: "flex justify-between items-center font-bold text-slate-900 pt-1.5 text-xs border-t border-slate-200 mt-1 bg-green-50/50 p-1 rounded" },
                                                        e("span", { className: "text-green-800" }, "Somma combinata Netta (al netto di conguaglio):"),
                                                        e("span", { className: "font-mono text-green-700 text-sm font-black" }, "€ " + formattaNumero(nettoCombinato, 2))
                                                    )
                                                );
                                            })(),
                                    (importoBase >= massimale2026 && haDiritto) && e("div", { className: "p-2.5 bg-orange-50 border border-orange-200 rounded text-xs text-orange-800 font-medium" },
                                        "⚠️ Cap Massimale: L'importo combinato superava il tetto di legge. Bloccato al valore limite di € " + formattaNumero(massimale2026, 2)
                                    )
                                )
                            ),

                            /* PASSO 3: CONVERSIONE IN GIORNI RESIDUI */
                            e("div", null,
                                e("div", { className: "text-xs font-bold text-slate-400 uppercase tracking-wider mb-2" }, "Passo 3: Scomposizione della durata in Giorni di Competenza"),
                                e("div", { className: "text-sm bg-slate-100/80 border border-slate-200 text-slate-800 p-4 rounded-lg font-mono space-y-2" },
                                    e("div", null, "• Settimane totali indennizzabili (Settimane / 2) = ", e("span", { className: "text-green-700 font-bold" }, durataSettimane)),
                                    e("div", null, "• Conversione in Giorni Effettivi (Settimane × 7 giorni) = ", e("span", { className: "text-green-700 font-bold" }, totaleGiorniIndennizzati + " giorni totali")),
                                    e("div", { className: "text-xs text-slate-500 border-t border-slate-200 pt-2 mt-2 leading-relaxed" },
                                        "La durata massima teorica è pari alla metà delle settimane contributive degli ultimi 4 anni (fino a un tetto di 24 mesi)."
                                    )
                                )
                            )

                        ),
                        e("h3", { className: "text-lg font-bold text-slate-800 flex items-center gap-2" }
                        ),

                        /* CALCOLO DETTAGLIATO DELL'ULTIMO MESE PARZIALE */
                        ultimoMeseParziale && e("div", { className: "p-4 bg-blue-50/60 border border-blue-200 rounded-xl text-slate-700 space-y-1.5 shadow-sm" },
                            e("div", { className: "font-bold text-blue-900 flex items-center gap-2 text-sm" }, "🔍 Focus Ultimo Mese (" + ultimoMese.mese + "° Mese)"),
                            e("p", { className: "text-xs leading-relaxed text-slate-600" },
                                "L'ultimo mese di spettanza è parziale poiché rimangono solo ", e("strong", null, ultimoMese.giorniPagati + " giorni"), " indennizzabili su 30. ",
                                "Il calcolo giornaliero applicato è: ",
                                e("br"),
                                e("span", { className: "font-mono bg-white px-2.5 py-1 rounded border border-blue-200 text-xs inline-block my-1.5 text-slate-800 shadow-xs" },
                                    "( € " + formattaNumero(ultimoMese.importoMensileLordo, 2) + " / 30 gg ) × " + ultimoMese.giorniPagati + " gg = € " + formattaNumero(ultimoMese.importoErogato, 2) + " Lordi"
                                ),
                                e("br"),
                                "Corrispondenti ad un netto reale erogato di ", e("span", { className: "text-green-700 font-bold" }, "€ " + formattaNumero(ultimoMese.importoNettoErogato, 2)), " (al netto del 23% IRPEF)."
                            )
                        ),

                        haDiritto && e("div", { className: "text-xs text-slate-500 space-y-1" },
                            e("p", null, "• ", e("strong", null, "Regola del Décalage (Riduzione):"), " L'importo mensile subisce una riduzione progressiva e cumulativa del 3% (moltiplicatore 0.97)."),
                            e("p", null, "• Avendo ", e("span", { className: "font-bold text-orange-600" }, eta + " anni"), ", la riduzione si attiva a partire dal ", e("strong", null, eta < 55 ? "6° mese" : "8° mese"), ".")
                        )
                    )
                ),
                /* SEZIONE TABELLA REGISTRO + FOCUS ULTIMO MESE */
                e("div", { className: "space-y-3" },


                    /* TABELLA ULTRALIGHT */
                    e(Card, null,
                        e("div", { className: "overflow-x-auto" },
                            e("table", { className: "w-full text-left border-collapse" },
                                e("thead", { className: "bg-slate-900 text-white text-xs font-semibold uppercase tracking-wider" },
                                    e("tr", null,
                                        e("th", { className: "p-4" }, "Periodo Liquidato"),
                                        e("th", { className: "p-4" }, "Tasso Mensile Lordo"),
                                        e("th", { className: "p-4 text-right" }, "Importo Lordo Spettante"),
                                        e("th", { className: "p-4 text-right text-green-400 font-bold" }, "Importo Netto Corrisposto")
                                    )
                                ),
                                e("tbody", { className: "divide-y divide-slate-100 text-sm" },
                                    tabellaMesi.length === 0 ?
                                        e("tr", null,
                                            e("td", { colSpan: "4", className: "p-8 text-center text-slate-400 font-medium italic" },
                                                "⚠️ Nessun pagamento previsto — Requisito minimo di 13 settimane non raggiunto."
                                            )
                                        ) :
                                        tabellaMesi.map(function (row) {
                                            var isUltimoEParziale = row.mese === ultimoMese.mese && ultimoMeseParziale;
                                            return e("tr", { key: row.mese, className: row.haRiduzione ? "bg-amber-50/40 hover:bg-amber-50" : "hover:bg-slate-50" },
                                                e("td", { className: "p-4 font-bold text-slate-900" },
                                                    row.mese + "° Mese",
                                                    row.haRiduzione && e("span", { className: "ml-2 inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-amber-100 text-amber-800" }, "-3% décalage"),
                                                    isUltimoEParziale && e("span", { className: "ml-2 inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-blue-100 text-blue-800" }, row.giorniPagati + " giorni")
                                                ),
                                                e("td", { className: "p-4 text-slate-600 font-mono text-xs" }, "€ " + formattaNumero(row.importoMensileLordo, 2)),
                                                e("td", { className: "p-4 text-right font-medium text-slate-600 font-mono text-xs" }, "€ " + formattaNumero(row.importoErogato, 2)),
                                                e("td", { className: "p-4 text-right font-black text-green-700 font-mono text-base" }, "€ " + formattaNumero(row.importoNettoErogato, 2))
                                            );
                                        })
                                )
                            )
                        )
                    )
                ),

                /* AVVERTENZA FINALE */
                e("div", { className: "text-center text-xs text-slate-400 font-medium pt-2 pb-6 space-y-1" },
                    e("p", null, "⚠️ Le simulazioni rispettano fedelmente i criteri di scomposizione temporale e di riduzione progressiva dei flussi Uniemens INPS"),
                    e("p", null, "Il valore Netto visualizzato è calcolato applicando un'aliquota IRPEF flat del 23% che è pensata per chi non ha addizionali comunali e regionali, conguagli fiscali, detrazioni personali e altri redditi. Quindi può differire di qualche punto percentuale!"),
                    e("p", null,
                        "* Cos'è l'imponibile previdenziale? È il tuo stipendio lordo soggetto a contributi INPS (no welfare, rimborsi, buoni pasto, benefit e altre voci non soggette a contributi INPS)"
                    ), 
                    e("p", null, "Di solito imponibile previdenziale ≈ RAL"),
                  
                )
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(e(NaspiCalculatorApp));
    </script>
</body>

</html>
