<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📈 Calcolatore Inflazione</title>
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel per JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* Stili custom per lo slider */
        .slider-container {
            position: relative;
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 9999px;
            cursor: pointer;
        }
        
        .slider-fill {
            position: absolute;
            height: 100%;
            background: #111827;
            border-radius: 9999px;
            pointer-events: none;
        }
        
        .slider-thumb {
            position: absolute;
            top: 50%;
            width: 20px;
            height: 20px;
            background: white;
            border: 2px solid #111827;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: grab;
            transition: box-shadow 0.15s;
            pointer-events: auto;
        }
        
        .slider-thumb:hover {
            box-shadow: 0 0 0 4px rgba(17, 24, 39, 0.1);
        }
        
        .slider-thumb:active {
            cursor: grabbing;
        }
        
        body {
            background-color: #f3f4f6;
        }

        /* Colori personalizzati */
        .text-rosso { color: #dc2626; }      /* Rosso per prezzo attuale */
        .text-verde { color: #16a34a; }       /* Verde per tasso inflazione */
        .text-blu { color: #2563eb; }         /* Blu per anni/anno futuro */
        .text-viola { color: #7c3aed; }       /* Viola per prezzo finale */

        /* Per mantenere il bold nell'esponente */
        sup {
            font-size: 0.75em;
            vertical-align: super;
        }

        /* Input field styling */
        .custom-input {
            border: 2px solid transparent;
            border-bottom: 2px dashed #9ca3af;
            background: transparent;
            text-align: center;
            font-weight: inherit;
            font-size: inherit;
            color: inherit;
            padding: 0 4px;
            outline: none;
            transition: border-color 0.2s;
            min-width: 60px;
        }

        .custom-input:focus {
            border-bottom-color: #111827;
        }

        .custom-input-rosso:focus { border-bottom-color: #dc2626; }
        .custom-input-blu:focus { border-bottom-color: #2563eb; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useCallback } = React;

        // Funzione per formattare numeri con spazi ogni 3 cifre
        const formattaNumero = (num, decimali = 2) => {
            const arrotondato = parseFloat(num.toFixed(decimali));
            const [parteIntera, parteDecimale] = arrotondato.toString().split('.');
            const parteInteraFormattata = parteIntera.replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
            
            if (decimali > 0 && parteDecimale !== undefined) {
                return `${parteInteraFormattata},${parteDecimale}`;
            }
            return parteInteraFormattata;
        };

        // Componente Slider Custom
        function Slider({ min = 0, max = 100, step = 1, value, onValueChange }) {
            const containerRef = useRef(null);
            const isDragging = useRef(false);

            const percentage = ((value[0] - min) / (max - min)) * 100;

            const updateValue = useCallback((clientX) => {
                if (!containerRef.current) return;
                
                const rect = containerRef.current.getBoundingClientRect();
                const x = clientX - rect.left;
                const percentage = Math.max(0, Math.min(1, x / rect.width));
                let newValue = min + percentage * (max - min);
                
                newValue = Math.round(newValue / step) * step;
                newValue = Math.max(min, Math.min(max, newValue));
                
                onValueChange([newValue]);
            }, [min, max, step, onValueChange]);

            const handleMouseDown = (e) => {
                isDragging.current = true;
                updateValue(e.clientX);
                
                const handleMouseMove = (e) => {
                    if (isDragging.current) {
                        updateValue(e.clientX);
                    }
                };
                
                const handleMouseUp = () => {
                    isDragging.current = false;
                    document.removeEventListener('mousemove', handleMouseMove);
                    document.removeEventListener('mouseup', handleMouseUp);
                };
                
                document.addEventListener('mousemove', handleMouseMove);
                document.addEventListener('mouseup', handleMouseUp);
            };

            const handleTouchStart = (e) => {
                updateValue(e.touches[0].clientX);
                
                const handleTouchMove = (e) => {
                    updateValue(e.touches[0].clientX);
                };
                
                const handleTouchEnd = () => {
                    document.removeEventListener('touchmove', handleTouchMove);
                    document.removeEventListener('touchend', handleTouchEnd);
                };
                
                document.addEventListener('touchmove', handleTouchMove);
                document.addEventListener('touchend', handleTouchEnd);
            };

            return (
                <div className="space-y-2">
                    <div 
                        ref={containerRef}
                        className="slider-container"
                        onMouseDown={handleMouseDown}
                        onTouchStart={handleTouchStart}
                    >
                        <div 
                            className="slider-fill" 
                            style={{ width: `${percentage}%` }}
                        />
                        <div 
                            className="slider-thumb" 
                            style={{ left: `${percentage}%` }}
                        />
                    </div>
                </div>
            );
        }

        // Componente Card
        function Card({ children, className = "" }) {
            return (
                <div className={`rounded-lg border bg-white shadow-sm ${className}`}>
                    {children}
                </div>
            );
        }

        function CardContent({ children, className = "" }) {
            return (
                <div className={`p-6 ${className}`}>
                    {children}
                </div>
            );
        }

        // App Principale
        function InflazioneApp() {
            const [oggetto, setOggetto] = useState("Una pizza");
            const [prezzoAttuale, setPrezzoAttuale] = useState(10);
			const annoBase = annoCorrente + 30;
			const annoFuturoArrotondato = Math.ceil(annoBase / 10) * 10;
			const [annoFuturo, setAnnoFuturo] = useState(() => {
			const annoBase = new Date().getFullYear() + 30;
			return Math.ceil(annoBase / 10) * 10;
			});
            const [tassoInflazione, setTassoInflazione] = useState(2);

            const annoCorrente = new Date().getFullYear();
            const anniDiDifferenza = annoFuturo - annoCorrente;

            const calcolaPrezzoFuturo = () => {
                if (anniDiDifferenza <= 0) return prezzoAttuale;
                return prezzoAttuale * Math.pow(1 + tassoInflazione / 100, anniDiDifferenza);
            };

            const prezzoFuturo = calcolaPrezzoFuturo();
            const aumentoAssoluto = prezzoFuturo - prezzoAttuale;
            const percentualeAumento = ((prezzoFuturo / prezzoAttuale) - 1) * 100;

            const tassoDecimale = parseFloat((tassoInflazione / 100).toFixed(4));

            return (
                <div className="p-8 max-w-4xl mx-auto space-y-10 font-sans">
                    
                    {/* Titolo */}
                    <h1 className="text-4xl font-extrabold text-center text-black tracking-tight">
                        📈 Calcolatore Inflazione
                    </h1>

                    {/* FRASE CENTRALE MINIMAL - INTERATTIVA */}
                    <Card className="shadow-md border-gray-200">
                        <CardContent className="p-8 md:p-12">
                            <div className="text-center space-y-8">
                                {/* Frase principale */}
                                <div className="text-2xl md:text-4xl font-bold leading-relaxed text-gray-800">
                                    <input 
                                        type="text"
                                        value={oggetto}
                                        onChange={(e) => setOggetto(e.target.value)}
                                        className="custom-input font-bold text-gray-900 w-32 md:w-48"
                                        placeholder="Una pizza"
                                    />{" "}
                                    che costa{" "}
                                    <input 
                                        type="number"
                                        value={prezzoAttuale}
                                        onChange={(e) => setPrezzoAttuale(parseFloat(e.target.value) || 0)}
                                        className="custom-input custom-input-rosso font-bold text-rosso w-24"
                                        step="0.5"
                                        min="0"
                                    />
                                    €{" "}
                                    <span className="text-gray-600">oggi</span>
                                    {" "}nel{" "}
                                    <input 
                                        type="number"
                                        value={annoFuturo}
                                        onChange={(e) => setAnnoFuturo(parseInt(e.target.value) || annoCorrente)}
                                        className="custom-input custom-input-blu font-bold text-blu w-28"
                                        min={annoCorrente}
                                    />
                                    {" "}costerà{" "}
                                    <span className="text-viola">
                                        {formattaNumero(prezzoFuturo)}€
                                    </span>
                                </div>

                                {/* Informazione anni differenza */}
                                <div className="text-sm text-gray-500">
                                    (tra {anniDiDifferenza > 0 ? anniDiDifferenza : 0} anni)
                                </div>
                            </div>
                        </CardContent>
                    </Card>

                    {/* CONTROLLI SLIDER */}
                    <Card className="shadow-md border-gray-200">
                        <CardContent className="space-y-6 p-6">
                            
                            {/* Prezzo attuale in ROSSO */}
                            <div className="space-y-2">
                                <div className="flex justify-between text-sm text-gray-600">
                                    <span>💰 Prezzo attuale (€)</span>
                                    <span className="font-bold text-rosso text-lg">€{formattaNumero(prezzoAttuale, 2)}</span>
                                </div>
                                <Slider
                                    min={0.5}
                                    max={1000}
                                    step={0.5}
                                    value={[prezzoAttuale]}
                                    onValueChange={(val) => setPrezzoAttuale(val[0])}
                                />
                            </div>

                            {/* Tasso inflazione annuale in VERDE */}
                            <div className="space-y-2">
                                <div className="flex justify-between text-sm text-gray-600">
                                    <span>📊 Tasso inflazione annuale (%)</span>
                                    <span className="font-bold text-verde text-lg">{tassoInflazione.toFixed(1)}%</span>
                                </div>
                                <Slider
                                    min={0}
                                    max={15}
                                    step={0.1}
                                    value={[tassoInflazione]}
                                    onValueChange={(val) => setTassoInflazione(val[0])}
                                />
                            </div>

                            {/* Anno futuro in BLU */}
                            <div className="space-y-2">
                                <div className="flex justify-between text-sm text-gray-600">
                                    <span>🗓️ Anno futuro</span>
                                    <span className="font-bold text-blu text-lg">{annoFuturo}</span>
                                </div>
                                <Slider
                                    min={annoCorrente}
                                    max={annoCorrente + 100}
                                    step={1}
                                    value={[annoFuturo]}
                                    onValueChange={(val) => setAnnoFuturo(val[0])}
                                />
                            </div>
                        </CardContent>
                    </Card>

                    {/* RISULTATO FINALE IN EVIDENZA */}
                    <Card className="shadow-md border-gray-200">
                        <CardContent className="p-6 space-y-4 text-center">
                            <div className="text-xl text-gray-600">Prezzo futuro stimato</div>
                            <div className="text-5xl font-bold text-viola">
                                €{formattaNumero(prezzoFuturo, 2)}
                            </div>
                            <div className="text-sm text-gray-500 mt-2">
                                +{formattaNumero(aumentoAssoluto, 2)}€ (+{percentualeAumento.toFixed(1)}% rispetto ad oggi)
                            </div>
                        </CardContent>
                    </Card>

                    {/* FORMULA E CONTO DETTAGLIATO */}
                    <Card className="shadow-sm border-gray-100">
                        <CardContent className="p-6 space-y-4 text-gray-700 text-sm">
                            <div className="font-semibold text-base">Formula utilizzata:</div>
                            
                            <code className="block bg-gray-50 p-4 rounded-md text-base leading-relaxed overflow-x-auto">
                                Prezzo<sub>futuro</sub> ={' '}
                                <span className="font-bold text-rosso">{formattaNumero(prezzoAttuale, 2)}</span>
                                {' '}× (1 +{' '}
                                <span className="font-bold text-verde">{tassoDecimale}</span>
                                {' '})<sup><span className="font-bold text-blu">{anniDiDifferenza > 0 ? anniDiDifferenza : 0}</span></sup>
                            </code>

                            <div className="pt-3 space-y-3 text-base">
                                <div className="bg-gray-50 p-4 rounded-md space-y-2">
                                    <div className="font-semibold text-gray-800 mb-2">Svolgimento:</div>
                                    
                                    <div className="flex justify-between items-center py-1">
                                        <span className="text-gray-600">Prezzo attuale:</span>
                                        <span className="font-semibold text-rosso">€{formattaNumero(prezzoAttuale, 2)}</span>
                                    </div>
                                    
                                    <div className="flex justify-between items-center py-1">
                                        <span className="text-gray-600">Tasso inflazione:</span>
                                        <span className="font-semibold text-verde">{tassoInflazione}% annuo</span>
                                    </div>
                                    
                                    <div className="flex justify-between items-center py-1">
                                        <span className="text-gray-600">Anni da oggi ({annoCorrente}) al {annoFuturo}:</span>
                                        <span className="font-semibold text-blu">{anniDiDifferenza > 0 ? anniDiDifferenza : 0} anni</span>
                                    </div>

                                    <div className="border-t border-gray-200 pt-2 mt-2">
                                        <div className="flex justify-between items-center py-1">
                                            <span className="text-gray-700 font-medium">Calcolo:</span>
                                            <span className="text-xs text-gray-500">
                                                {formattaNumero(prezzoAttuale, 2)} × (1.{tassoDecimale.toString().substring(1)})<sup>{anniDiDifferenza > 0 ? anniDiDifferenza : 0}</sup>
                                            </span>
                                        </div>
                                        
                                        <div className="flex justify-between items-center py-1 mt-2">
                                            <span className="text-gray-700 font-medium">Aumento assoluto:</span>
                                            <span className="font-semibold text-orange-600">+€{formattaNumero(aumentoAssoluto, 2)}</span>
                                        </div>
                                        
                                        <div className="flex justify-between items-center py-1">
                                            <span className="text-gray-700 font-medium">Prezzo finale:</span>
                                            <span className="font-bold text-viola text-lg">€{formattaNumero(prezzoFuturo, 2)}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Legenda colori */}
                            <div className="pt-4 mt-4 border-t border-gray-200">
                                <div className="text-xs text-gray-500 font-medium mb-2">Legenda colori:</div>
                                <div className="flex flex-wrap gap-4 text-xs">
                                    <span><span className="inline-block w-3 h-3 rounded-full bg-red-500 mr-1"></span>Prezzo attuale</span>
                                    <span><span className="inline-block w-3 h-3 rounded-full bg-green-500 mr-1"></span>Tasso inflazione</span>
                                    <span><span className="inline-block w-3 h-3 rounded-full bg-blue-500 mr-1"></span>Anni</span>
                                    <span><span className="inline-block w-3 h-3 rounded-full bg-violet-500 mr-1"></span>Prezzo futuro</span>
                                </div>
                            </div>
                        </CardContent>
                    </Card>

                    {/* Nota informativa */}
                    <div className="text-center text-xs text-gray-400 pt-2 pb-4">
                        ⚠️ I calcoli sono stime basate sul tasso di inflazione medio. I prezzi reali possono variare.
                    </div>
                </div>
            );
        }

        // Render dell'app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<InflazioneApp />);
    </script>
</body>
</html>
