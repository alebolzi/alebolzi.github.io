<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📈 Calcolatore Inflazione</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <style>
        .slider-container {
            position: relative;
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 9999px;
            cursor: pointer;
        }

        .slider-fill {
            position: absolute;
            height: 100%;
            background: #111827;
            border-radius: 9999px;
            pointer-events: none;
        }

        .slider-thumb {
            position: absolute;
            top: 50%;
            width: 20px;
            height: 20px;
            background: white;
            border: 2px solid #111827;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: grab;
            transition: box-shadow 0.15s;
            pointer-events: auto;
        }

        .slider-thumb:hover {
            box-shadow: 0 0 0 4px rgba(17, 24, 39, 0.1);
        }

        .slider-thumb:active {
            cursor: grabbing;
        }

        body {
            background-color: #f3f4f6;
        }

        .text-rosso { color: #dc2626; }
        .text-verde { color: #16a34a; }
        .text-blu { color: #2563eb; }
        .text-viola { color: #7c3aed; }

        sup {
            font-size: 0.75em;
            vertical-align: super;
        }

        .custom-input {
            border: 2px solid transparent;
            border-bottom: 2px dashed #9ca3af;
            background: transparent;
            text-align: center;
            font-weight: inherit;
            font-size: inherit;
            color: inherit;
            padding: 0 4px;
            outline: none;
            transition: border-color 0.2s;
            min-width: 60px;
        }

        .custom-input:focus {
            border-bottom-color: #111827;
        }

        .custom-input-rosso:focus { border-bottom-color: #dc2626; }
        .custom-input-blu:focus { border-bottom-color: #2563eb; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
    const e = React.createElement;
    const { useState, useRef, useCallback } = React;

    /* FORMAT PERSONALIZZATO (spazi come separatore migliaia, virgola decimale) */
    function formattaNumero(num, decimali) {
        if (decimali === undefined) decimali = 2;
        var arrotondato = parseFloat(Number(num).toFixed(decimali));
        var parti = arrotondato.toString().split('.');
        var parteIntera = parti[0].replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
        if (decimali > 0 && parti[1] !== undefined) {
            return parteIntera + ',' + parti[1];
        }
        return parteIntera;
    }
        
    function useAutoWidth(value, min = 2) {
        var ref = React.useRef(null);
    
        React.useEffect(() => {
            if (!ref.current) return;
    
            ref.current.textContent = value || "";
        }, [value]);
    
        return ref;
    }
    /* SLIDER */
    function Slider(props) {
        var min = props.min !== undefined ? props.min : 0;
        var max = props.max !== undefined ? props.max : 100;
        var step = props.step !== undefined ? props.step : 1;
        var value = props.value;
        var onValueChange = props.onValueChange;

        var containerRef = useRef(null);
        var isDragging = useRef(false);
        var val = Array.isArray(value) ? value[0] : value;
        var percentage = ((val - min) / (max - min)) * 100;

        var updateValue = useCallback(function(clientX) {
            if (!containerRef.current) return;
            var rect = containerRef.current.getBoundingClientRect();
            var x = clientX - rect.left;
            var p = Math.max(0, Math.min(1, x / rect.width));
            var newValue = min + p * (max - min);
            newValue = Math.round(newValue / step) * step;
            newValue = Math.max(min, Math.min(max, newValue));
            onValueChange([newValue]);
        }, [min, max, step, onValueChange]);

        function handleMouseDown(ev) {
            isDragging.current = true;
            updateValue(ev.clientX);
            var move = function(ev) { if (isDragging.current) updateValue(ev.clientX); };
            var up = function() {
                isDragging.current = false;
                document.removeEventListener('mousemove', move);
                document.removeEventListener('mouseup', up);
            };
            document.addEventListener('mousemove', move);
            document.addEventListener('mouseup', up);
        }

        function handleTouchStart(ev) {
            updateValue(ev.touches[0].clientX);
            var move = function(ev) { updateValue(ev.touches[0].clientX); };
            var end = function() {
                document.removeEventListener('touchmove', move);
                document.removeEventListener('touchend', end);
            };
            document.addEventListener('touchmove', move);
            document.addEventListener('touchend', end);
        }

        return e("div", { className: "space-y-2" },
            e("div", {
                ref: containerRef,
                className: "slider-container",
                onMouseDown: handleMouseDown,
                onTouchStart: handleTouchStart
            },
                e("div", { className: "slider-fill", style: { width: percentage + "%" } }),
                e("div", { className: "slider-thumb", style: { left: percentage + "%" } })
            )
        );
    }

    /* CARD */
    function Card(props) {
        return e("div", {
            className: "rounded-lg border bg-white shadow-sm " + (props.className || "")
        }, props.children);
    }

    function CardContent(props) {
        return e("div", {
            className: "p-6 " + (props.className || "")
        }, props.children);
    }

    /* APP */
    function InflazioneApp() {
        var annoCorrente = new Date().getFullYear();

        var oggettoState = useState("Una pizza");
        var oggetto = oggettoState[0];
        var setOggetto = oggettoState[1];

        var prezzoState = useState(10);
        var prezzoAttuale = prezzoState[0];
        var setPrezzoAttuale = prezzoState[1];

        /* FIX: prima era `annoCorrente + 30` ma annoCorrente non era ancora definito */
        var annoFuturoState = useState(function() {
            var base = new Date().getFullYear() + 30;
            return Math.ceil(base / 10) * 10;
        });
        var annoFuturo = annoFuturoState[0];
        var setAnnoFuturo = annoFuturoState[1];

        var tassoState = useState(2);
        var tassoInflazione = tassoState[0];
        var setTassoInflazione = tassoState[1];

        var anniDiDifferenza = annoFuturo - annoCorrente;

        var prezzoFuturo;
        if (anniDiDifferenza <= 0) {
            prezzoFuturo = prezzoAttuale;
        } else {
            prezzoFuturo = prezzoAttuale * Math.pow(1 + tassoInflazione / 100, anniDiDifferenza);
        }

        var aumentoAssoluto = prezzoFuturo - prezzoAttuale;
        var percentualeAumento = ((prezzoFuturo / prezzoAttuale) - 1) * 100;
        var tassoDecimale = parseFloat((tassoInflazione / 100).toFixed(4));

        /* Per il rigo "Calcolo:" nella sezione svolgimento */
        var fattoreTesto = "1" + tassoDecimale.toString().substring(1);
        var anniMostrati = anniDiDifferenza > 0 ? anniDiDifferenza : 0;

        return e("div", { className: "p-8 max-w-4xl mx-auto space-y-10 font-sans" },

            /* TITOLO */
            e("h1", { className: "text-4xl font-extrabold text-center text-black tracking-tight" },
                "📈 Calcolatore Inflazione"
            ),

            /* FRASE CENTRALE INTERATTIVA */
            e(Card, { className: "shadow-md border-gray-200" },
                e(CardContent, { className: "p-8 md:p-12" },
                    e("div", { className: "text-center space-y-8" },

                        /* Frase principale */
                     

e("div", { className: "text-2xl md:text-4xl font-bold leading-relaxed text-gray-800" },

    e("span", null,

        e("input", {
            type: "text",
            value: oggetto,
            onChange: function(ev) { setOggetto(ev.target.value); },
            className: "custom-input font-bold text-gray-900",
            style: { width: (oggetto.length + 1) + "ch" },
            placeholder: "Una pizza"
        }),

        " che costa ",

        e("input", {
            type: "number",
            value: prezzoAttuale,
            onChange: function(ev) { setPrezzoAttuale(parseFloat(ev.target.value) || 0); },
            className: "custom-input custom-input-rosso font-bold text-rosso",
            style: { width: (String(prezzoAttuale).length + 2) + "ch" },
            step: "0.5",
            min: "0"
        }),

        "€ nel ",

        e("input", {
            type: "number",
            value: annoFuturo,
            onChange: function(ev) { setAnnoFuturo(parseInt(ev.target.value) || annoCorrente); },
            className: "custom-input custom-input-blu font-bold text-blu",
            style: { width: (String(annoFuturo).length + 2) + "ch" },
            min: annoCorrente
        }),

        " costerà ",
        e("span", { className: "text-viola" },
            formattaNumero(prezzoFuturo) + "€"
        )
    )
),

                        /* Anni differenza */
                        e("div", { className: "text-sm text-gray-500" },
                            "(tra " + (anniDiDifferenza > 0 ? anniDiDifferenza : 0) + " anni)"
                        )
                    )
                )
            ),

            /* SLIDER */
            e(Card, { className: "shadow-md border-gray-200" },
                e(CardContent, { className: "space-y-6 p-6" },

                    /* Prezzo attuale */
                    e("div", { className: "space-y-2" },
                        e("div", { className: "flex justify-between text-sm text-gray-600" },
                            e("span", null, "💰 Prezzo attuale (€)"),
                            e("span", { className: "font-bold text-rosso text-lg" },
                                "€" + formattaNumero(prezzoAttuale, 2)
                            )
                        ),
                        e(Slider, {
                            min: 0.5, max: 1000, step: 0.5,
                            value: [prezzoAttuale],
                            onValueChange: function(v) { setPrezzoAttuale(v[0]); }
                        })
                    ),

                    /* Tasso inflazione */
                    e("div", { className: "space-y-2" },
                        e("div", { className: "flex justify-between text-sm text-gray-600" },
                            e("span", null, "📊 Tasso inflazione annuale (%)"),
                            e("span", { className: "font-bold text-verde text-lg" },
                                tassoInflazione.toFixed(1) + "%"
                            )
                        ),
                        e(Slider, {
                            min: 0, max: 15, step: 0.1,
                            value: [tassoInflazione],
                            onValueChange: function(v) { setTassoInflazione(v[0]); }
                        })
                    ),

                    /* Anno futuro */
                    e("div", { className: "space-y-2" },
                        e("div", { className: "flex justify-between text-sm text-gray-600" },
                            e("span", null, "🗓️ Anno futuro"),
                            e("span", { className: "font-bold text-blu text-lg" }, annoFuturo)
                        ),
                        e(Slider, {
                            min: annoCorrente, max: annoCorrente + 100, step: 1,
                            value: [annoFuturo],
                            onValueChange: function(v) { setAnnoFuturo(v[0]); }
                        })
                    )
                )
            ),

            /* RISULTATO FINALE */
            e(Card, { className: "shadow-md border-gray-200" },
                e(CardContent, { className: "p-6 space-y-4 text-center" },
                    e("div", { className: "text-xl text-gray-600" }, "Prezzo futuro stimato"),
                    e("div", { className: "text-5xl font-bold text-viola" },
                        "€" + formattaNumero(prezzoFuturo, 2)
                    ),
                    e("div", { className: "text-sm text-gray-500 mt-2" },
                        "+" + formattaNumero(aumentoAssoluto, 2) + "€ (+" + percentualeAumento.toFixed(1) + "% rispetto ad oggi)"
                    )
                )
            ),

            /* FORMULA E SVOLGIMENTO */
            e(Card, { className: "shadow-sm border-gray-100" },
                e(CardContent, { className: "p-6 space-y-4 text-gray-700 text-sm" },

                    e("div", { className: "font-semibold text-base" }, "Formula utilizzata:"),

                    e("code", { className: "block bg-gray-50 p-4 rounded-md text-base leading-relaxed overflow-x-auto" },
                        "Prezzo", e("sub", null, "futuro"), " = ",
                        e("span", { className: "font-bold text-rosso" }, formattaNumero(prezzoAttuale, 2)),
                        " × (1 + ",
                        e("span", { className: "font-bold text-verde" }, tassoDecimale),
                        ")",
                        e("sup", null, e("span", { className: "font-bold text-blu" }, anniMostrati))
                    ),

                    /* SVOLGIMENTO */
                    e("div", { className: "pt-3 space-y-3 text-base" },
                        e("div", { className: "bg-gray-50 p-4 rounded-md space-y-2" },

                            e("div", { className: "font-semibold text-gray-800 mb-2" }, "Svolgimento:"),

                            e("div", { className: "flex justify-between items-center py-1" },
                                e("span", { className: "text-gray-600" }, "Prezzo attuale:"),
                                e("span", { className: "font-semibold text-rosso" }, "€" + formattaNumero(prezzoAttuale, 2))
                            ),

                            e("div", { className: "flex justify-between items-center py-1" },
                                e("span", { className: "text-gray-600" }, "Tasso inflazione:"),
                                e("span", { className: "font-semibold text-verde" }, tassoInflazione + "% annuo")
                            ),

                            e("div", { className: "flex justify-between items-center py-1" },
                                e("span", { className: "text-gray-600" },
                                    "Anni da oggi (" + annoCorrente + ") al " + annoFuturo + ":"
                                ),
                                e("span", { className: "font-semibold text-blu" }, anniMostrati + " anni")
                            ),

                            e("div", { className: "border-t border-gray-200 pt-2 mt-2" },

                                e("div", { className: "flex justify-between items-center py-1" },
                                    e("span", { className: "text-gray-700 font-medium" }, "Calcolo:"),
                                    e("span", { className: "text-xs text-gray-500" },
                                        formattaNumero(prezzoAttuale, 2) + " × (" + fattoreTesto + ")",
                                        e("sup", null, anniMostrati)
                                    )
                                ),

                                e("div", { className: "flex justify-between items-center py-1 mt-2" },
                                    e("span", { className: "text-gray-700 font-medium" }, "Aumento assoluto:"),
                                    e("span", { className: "font-semibold text-orange-600" }, "+€" + formattaNumero(aumentoAssoluto, 2))
                                ),

                                e("div", { className: "flex justify-between items-center py-1" },
                                    e("span", { className: "text-gray-700 font-medium" }, "Prezzo finale:"),
                                    e("span", { className: "font-bold text-viola text-lg" }, "€" + formattaNumero(prezzoFuturo, 2))
                                )
                            )
                        )
                    ),

                    /* LEGENDA */
                    e("div", { className: "pt-4 mt-4 border-t border-gray-200" },
                        e("div", { className: "text-xs text-gray-500 font-medium mb-2" }, "Legenda colori:"),
                        e("div", { className: "flex flex-wrap gap-4 text-xs" },
                            e("span", null,
                                e("span", { className: "inline-block w-3 h-3 rounded-full bg-red-500 mr-1" }),
                                "Prezzo attuale"
                            ),
                            e("span", null,
                                e("span", { className: "inline-block w-3 h-3 rounded-full bg-green-500 mr-1" }),
                                "Tasso inflazione"
                            ),
                            e("span", null,
                                e("span", { className: "inline-block w-3 h-3 rounded-full bg-blue-500 mr-1" }),
                                "Anni"
                            ),
                            e("span", null,
                                e("span", { className: "inline-block w-3 h-3 rounded-full bg-violet-500 mr-1" }),
                                "Prezzo futuro"
                            )
                        )
                    )
                )
            ),

            /* NOTA */
            e("div", { className: "text-center text-xs text-gray-400 pt-2 pb-4" },
                "⚠️ I calcoli sono stime basate sul tasso di inflazione medio. I prezzi reali possono variare."
            )
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(e(InflazioneApp));
    </script>
</body>
</html>
