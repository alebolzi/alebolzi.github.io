<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>💸 Calcolatore Interesse Composto</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#f3f4f6; }

.slider-container {
  position: relative;
  width: 100%;
  height: 8px;
  background: #e5e7eb;
  border-radius: 9999px;
  cursor: pointer;
}

.slider-fill {
  position: absolute;
  height: 100%;
  background: #111827;
  border-radius: 9999px;
}

.slider-thumb {
  position: absolute;
  top: 50%;
  width: 18px;
  height: 18px;
  background: white;
  border: 2px solid #111827;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

.text-rosso { color:#dc2626; }
.text-verde { color:#16a34a; }
.text-blu { color:#2563eb; }
.text-viola { color:#7c3aed; }
.text-rosa { color:#db2777; }
</style>
</head>

<body>

<div id="root"></div>

<script>

const e = React.createElement;
const { useState, useRef, useEffect, useCallback } = React;

function formattaNumero(num, dec) {
  if (dec === undefined) dec = 0;
  return Number(num).toLocaleString("it-IT", {
    minimumFractionDigits: dec,
    maximumFractionDigits: dec
  });
}

/* === SLIDER CON TOUCH SUPPORT === */
function Slider(props) {
  var min = props.min !== undefined ? props.min : 0;
  var max = props.max !== undefined ? props.max : 100;
  var step = props.step !== undefined ? props.step : 1;
  var value = props.value;
  var onValueChange = props.onValueChange;
  var ref = useRef(null);

  var val = Array.isArray(value) ? value[0] : value;
  var safeVal = Math.min(Math.max(val, min), max);
  var percentage = ((safeVal - min) / (max - min)) * 100;

  var updateValue = useCallback(function(clientX) {
    if (!ref.current) return;
    var rect = ref.current.getBoundingClientRect();
    var p = (clientX - rect.left) / rect.width;
    p = Math.max(0, Math.min(1, p));
    var v = min + p * (max - min);
    v = Math.round(v / step) * step;
    v = Math.max(min, Math.min(max, v));
    onValueChange([v]);
  }, [min, max, step, onValueChange]);

  function pointerDown(ev) {
    ev.preventDefault();
    var clientX = ev.touches ? ev.touches[0].clientX : ev.clientX;
    updateValue(clientX);

    var move = function(ev) {
      var cx = ev.touches ? ev.touches[0].clientX : ev.clientX;
      updateValue(cx);
    };
    var up = function() {
      document.removeEventListener("mousemove", move);
      document.removeEventListener("mouseup", up);
      document.removeEventListener("touchmove", move);
      document.removeEventListener("touchend", up);
    };
    document.addEventListener("mousemove", move);
    document.addEventListener("mouseup", up);
    document.addEventListener("touchmove", move, { passive: false });
    document.addEventListener("touchend", up);
  }

  return e("div", {
    ref: ref,
    className: "slider-container",
    onMouseDown: pointerDown,
    onTouchStart: pointerDown
  },
    e("div", { className: "slider-fill", style: { width: percentage + "%" } }),
    e("div", { className: "slider-thumb", style: { left: percentage + "%" } })
  );
}

function Card(props) {
  return e("div", { className: "rounded-xl bg-white shadow border " + (props.className || "") }, props.children);
}

function CardContent(props) {
  return e("div", { className: "p-6 " + (props.className || "") }, props.children);
}

function App() {

  const [capitaleIniziale, setCapitaleIniziale] = useState(10000);
  const [risparmio, setRisparmio] = useState(400);
  const [interesse, setInteresse] = useState(7);
  const [anni, setAnni] = useState(40);
  const [volatility, setVolatility] = useState(0);
  const [inflazione, setInflazione] = useState(2);
  const [tasse, setTasse] = useState(26);
  const [editCapitale, setEditCapitale] = useState(false);

  const chartRef = useRef(null);
  const chartInstance = useRef(null);

  function getRandomReturn(mean, vol) {
    return mean + ((Math.random() * 2) - 1) * vol;
  }

  function simulate() {
    var capitale = capitaleIniziale;
    var data = [];
    data.push(capitale);

    for (var y = 0; y < anni; y++) {
      var rendimentoAnnuale = getRandomReturn(interesse, volatility);
      rendimentoAnnuale = Math.max(-99, rendimentoAnnuale);
      var rm = Math.pow(1 + rendimentoAnnuale / 100, 1 / 12) - 1;

      for (var m = 0; m < 12; m++) {
        capitale += risparmio;
        capitale *= (1 + rm);
      }
      data.push(capitale);
    }
    return data;
  }

  var dati = simulate();
  var totale = dati.at(-1);
  var capitaleVersato = capitaleIniziale + (risparmio * 12 * anni);
  var interessiGuadagnati = totale - capitaleVersato;
  var plusvalenza = Math.max(0, interessiGuadagnati);
  var tasseDaPagare = plusvalenza * (tasse / 100);
  var totaleNetto = totale - tasseDaPagare;

  var fattoreInflazione = Math.pow(1 + inflazione / 100, anni);
  var percepito = totaleNetto / fattoreInflazione;

  /* === Dati per le linee secondarie del grafico === */
  var datiCapitaleVersato = [];
  var datiNetto = [];
  var datiPercepito = [];

  for (var i = 0; i <= anni; i++) {
    var versatoQui = capitaleIniziale + risparmio * 12 * i;
    datiCapitaleVersato.push(versatoQui);

    var plusvQui = Math.max(0, dati[i] - versatoQui);
    var tasseQui = plusvQui * (tasse / 100);
    var nettoQui = dati[i] - tasseQui;
    datiNetto.push(nettoQui);

    var fattoreQui = Math.pow(1 + inflazione / 100, i);
    datiPercepito.push(nettoQui / fattoreQui);
  }

  useEffect(function() {
    if (chartInstance.current) chartInstance.current.destroy();
    chartInstance.current = new Chart(chartRef.current, {
      type: "line",
      data: {
        labels: Array.from({ length: anni + 1 }, function(_, i) { return i; }),
        datasets: [
          {
            label: "Percepito",
            data: datiPercepito,
            borderColor: "#db2777",
            backgroundColor: "rgba(219, 39, 119, 0.05)",
            tension: 0.25,
            borderWidth: 1.5,
            borderDash: [5, 5],
            pointRadius: 0
          },
          {
            label: "Totale netto",
            data: datiNetto,
            borderColor: "#2563eb",
            backgroundColor: "rgba(37, 99, 235, 0.05)",
            tension: 0.25,
            borderWidth: 1.5,
            borderDash: [5, 5],
            pointRadius: 0
          },
          {
            label: "Capitale versato",
            data: datiCapitaleVersato,
            borderColor: "#9ca3af",
            backgroundColor: "rgba(156, 163, 175, 0.05)",
            tension: 0,
            borderWidth: 1.5,
            borderDash: [5, 5],
            pointRadius: 0
          },
          {
            label: "Capitale lordo",
            data: dati,
            borderColor: "#7c3aed",
            backgroundColor: "rgba(124, 58, 237, 0.08)",
            fill: true,
            tension: 0.25,
            borderWidth: 2.5,
            pointRadius: 0
          }
        ]
      },
      options: {
        responsive: true,
        interaction: {
          mode: "index",
          intersect: false
        },
        plugins: {
          legend: {
            display: true,
            position: "top",
            labels: {
              usePointStyle: true,
              pointStyle: "line",
              padding: 16,
              font: { size: 12 }
            }
          },
          tooltip: {
            callbacks: {
              label: function(ctx) {
                return ctx.dataset.label + ": €" + formattaNumero(ctx.parsed.y);
              }
            }
          }
        },
        scales: {
          y: {
            ticks: {
              callback: function(v) {
                if (v >= 1000000) return "€" + (v / 1000000).toFixed(1) + "M";
                if (v >= 1000) return "€" + (v / 1000).toFixed(0) + "k";
                return "€" + formattaNumero(v);
              },
              font: { size: 11 }
            }
          }
        }
      }
    });
  }, [capitaleIniziale, risparmio, interesse, anni, volatility, tasse, inflazione]);

  /* --- Helper per la formula --- */
  function rmTag() {
    return [e("sub", { key: "s" }, "m")];
  }

  function esponenteAnni() {
  return e("sup", null, "12×", e("span", { className: "font-bold text-blu" }, anni));
}

  return e("div", { className: "max-w-3xl mx-auto p-8 space-y-8 font-sans" },

    e("h1", { className: "text-4xl font-extrabold text-center" },
      "💸 Calcolatore Interesse Composto"
    ),

    /* SETTINGS */
    e(Card, null,
      e(CardContent, { className: "space-y-6" },

        e("div", { className: "space-y-2" },
          e("div", { className: "flex justify-between items-center" },
            e("span", null, "Capitale iniziale"),
            !editCapitale
              ? e("div", { className: "flex items-center gap-2 cursor-pointer", onClick: function() { setEditCapitale(true); } },
                  e("b", { className: "text-viola text-lg" }, "€" + formattaNumero(capitaleIniziale)),
                  e("span", { className: "text-gray-400 text-sm" }, "✏️")
                )
              : e("input", {
                  autoFocus: true,
                  className: "text-right font-bold text-viola bg-transparent border-b outline-none w-40",
                  value: capitaleIniziale,
                  onChange: function(ev) { setCapitaleIniziale(+ev.target.value); },
                  onBlur: function() { setEditCapitale(false); },
                  onKeyDown: function(ev) { if (ev.key === "Enter") setEditCapitale(false); }
                })
          ),
          e(Slider, { min: 0, max: 100000, step: 1000, value: [capitaleIniziale], onValueChange: function(v) { setCapitaleIniziale(v[0]); } })
        ),

        e("div", { className: "space-y-2" },
          e("div", { className: "flex justify-between" },
            e("span", null, "Risparmio mensile"),
            e("span", { className: "font-bold text-rosso" }, "€" + formattaNumero(risparmio))
          ),
          e(Slider, { min: 0, max: 2000, step: 10, value: [risparmio], onValueChange: function(v) { setRisparmio(v[0]); } })
        ),

        e("div", { className: "space-y-2" },
          e("div", { className: "flex justify-between" },
            e("span", null, "Interesse annuale"),
            e("span", { className: "font-bold text-verde" }, formattaNumero(interesse, 1) + "%")
          ),
          e(Slider, { min: 0, max: 30, step: 0.1, value: [interesse], onValueChange: function(v) { setInteresse(v[0]); } })
        ),

        e("div", { className: "space-y-2" },
          e("div", { className: "flex justify-between" },
            e("span", null, "Tassazione plusvalenza"),
            e("span", { className: "font-bold text-orange-500" }, formattaNumero(tasse, 1) + "%")
          ),
          e(Slider, { min: 0, max: 60, step: 0.5, value: [tasse], onValueChange: function(v) { setTasse(v[0]); } })
        ),

        e("div", { className: "space-y-2" },
          e("div", { className: "flex justify-between" },
            e("span", null, "Numero di anni"),
            e("span", { className: "font-bold text-blu" }, anni)
          ),
          e(Slider, { min: 1, max: 100, step: 1, value: [anni], onValueChange: function(v) { setAnni(v[0]); } })
        ),

        e("div", { className: "space-y-2" },
          e("div", { className: "flex justify-between" },
            e("span", null, "🎲 Volatilità annuale"),
            e("span", { className: "font-bold" },
              e("span", { style: { color: "#2dd4bf", fontWeight: "bold" } }, "±" + formattaNumero(volatility, 1) + "%")
            )
          ),
          e(Slider, { min: 0, max: 50, step: 0.5, value: [volatility], onValueChange: function(v) { setVolatility(v[0]); } })
        ),

        e("div", { className: "space-y-2" },
          e("div", { className: "flex justify-between" },
            e("span", null, "📉 Inflazione annua"),
            e("span", { className: "font-bold text-rosa" }, formattaNumero(inflazione, 1) + "%")
          ),
          e(Slider, { min: 0, max: 5, step: 0.1, value: [inflazione], onValueChange: function(v) { setInflazione(v[0]); } })
        )
      )
    ),

    /* RISULTATO */
    e(Card, null,
      e(CardContent, { className: "space-y-4 text-center" },
        e("div", { className: "text-xl text-gray-500" }, "Totale maturato"),
        e("div", { className: "text-5xl font-bold text-viola" }, "€" + formattaNumero(totale, 2)),
        e("div", { className: "space-y-2 text-sm text-gray-600" },
          e("div", null, "Capitale versato:", e("b", null, " €" + formattaNumero(capitaleVersato, 2))),
          e("div", null, "Interessi guadagnati:",
            e("b", { className: interessiGuadagnati >= 0 ? "text-green-600" : "text-red-500" }, " €" + formattaNumero(interessiGuadagnati, 2))
          ),
          e("div", null, "Tasse sulla plusvalenza:",
            e("b", { className: "text-orange-500" }, " €" + formattaNumero(tasseDaPagare, 2))
          ),
          e("div", null, "Totale netto finale:",
            e("b", { className: "text-cyan-600" }, " €" + formattaNumero(totaleNetto, 2))
          ),
          e("div", null, "Percepito:",
            e("b", { className: "text-rosa" }, " €" + formattaNumero(percepito, 2))
          )
        )
      )
    ),

    /* GRAFICO */
    e(Card, null,
      e(CardContent, null, e("canvas", { ref: chartRef }))
    ),

    /* FORMULA */
    e(Card, null,
      e(CardContent, { className: "space-y-4 text-sm" },
        e("div", { className: "font-semibold" }, "Formula utilizzata"),

        volatility === 0 && e("code", { className: "block bg-gray-50 p-4 rounded-md leading-relaxed" },
          "Totale = ",
          e("span", { className: "font-bold text-viola" }, formattaNumero(capitaleIniziale)),
          " × (1+r", rmTag(), ")", esponenteAnni(),
          " + ",
          e("span", { className: "font-bold text-rosso" }, formattaNumero(risparmio)),
          " × (1+r", rmTag(), ") × ( ( (1+r", rmTag(), ")", esponenteAnni(),
          " - 1 ) ÷ r", rmTag(), " )",
          e("br"), e("br"),
          "r", rmTag(), " = (1+", e("span", { className: "font-bold text-verde" }, "r"), ")", e("sup", null, "1/12"), " - 1",
          e("br"), e("br"),
          e("span", { className: "font-bold text-verde" }, "r"), " = ",
          e("span", { className: "font-bold text-green-600" }, formattaNumero(interesse, 1) + "%"),
          e("br"), e("br"),
          "Plusvalenza = Totale - Capitale versato",
          e("br"), e("br"),
          "Tasse = Plusvalenza \u00D7 ",
          e("span", { className: "font-bold text-orange-500" }, formattaNumero(tasse, 1) + "%"),
          e("br"), e("br"),
          "Totale netto = Totale - Tasse",
          e("br"), e("br"),
          e("span", { className: " " }, "Percepito"),
          " = Totale netto \u00F7 (1+",
          e("span", { className: "font-bold text-rosa" }, "i"),
          ")", e("sup", null, e("span", { className: "font-bold text-blu" }, anni)),
          e("br"), e("br"),
          e("span", { className: "font-bold text-rosa" }, "i"), " = ",
          e("span", { className: "font-bold text-rosa" }, formattaNumero(inflazione, 1) + "%")
        ),
        volatility > 0 && e("code", { className: "block bg-gray-50 p-4 rounded-md leading-relaxed" },
          "Totale = ",
          e("span", { className: "font-bold text-viola" }, formattaNumero(capitaleIniziale)),
          " × (1+R", rmTag(), ")", esponenteAnni(),
          " + ",
          e("span", { className: "font-bold text-rosso" }, formattaNumero(risparmio)),
          " × (1+R", rmTag(), ") × ( ( (1+R", rmTag(), ")", esponenteAnni(),
          " - 1 ) ÷ R", rmTag(), " )",
          e("br"), e("br"),
          "R", rmTag(), " = (1+", e("span", { className: "font-bold", style: { color: "#2dd4bf" } }, "R"), ")", e("sup", null, "1/12"), " - 1",
          e("br"), e("br"),
          e("span", { className: "font-bold", style: { color: "#2dd4bf" } }, "R"), " = random(",
          e("span", { style: { color: "#2dd4bf", fontWeight: "bold" } }, formattaNumero(interesse - volatility, 1) + "%"),
          " ; ",
          e("span", { style: { color: "#2dd4bf", fontWeight: "bold" } }, formattaNumero(interesse + volatility, 1) + "%"),
          ")",
          e("br"), e("br"),
          e("span", { className: "text-gray-500 text-xs" }, "R cambia casualmente ogni anno."),
          e("br"), e("br"),
          "Plusvalenza = Totale - Capitale versato",
          e("br"), e("br"),
          "Tasse = Plusvalenza \u00D7 ",
          e("span", { className: "font-bold text-orange-500" }, formattaNumero(tasse, 1) + "%"),
          e("br"), e("br"),
          "Totale netto = Totale - Tasse",
          e("br"), e("br"),
          e("span", { className: " " }, "Percepito"),
          " = Totale netto \u00F7 (1+",
          e("span", { className: "font-bold text-rosa" }, "i"),
          ")", e("sup", null, e("span", { className: "font-bold text-blu" }, anni)),
          e("br"), e("br"),
          e("span", { className: "font-bold text-rosa" }, "i"), " = ",
          e("span", { className: "font-bold text-rosa" }, formattaNumero(inflazione, 1) + "%")
        )
      )
    ),

    e("div", { className: "text-center text-xs text-gray-400" },
      e("a", { href: "/interesse-composto/v.1.0.html" }, " Vai a versione iniziale semplificata "),
      e("br"), "ciauuuu✨"
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));

</script>

</body>

</html>
