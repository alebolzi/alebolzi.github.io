<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💹 TRADING vs HOLDING</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <style>
        .slider-container {
            position: relative;
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 9999px;
            cursor: pointer;
        }

        .slider-fill {
            position: absolute;
            height: 100%;
            background: #111827;
            border-radius: 9999px;
            pointer-events: none;
        }

        .slider-thumb {
            position: absolute;
            top: 50%;
            width: 20px;
            height: 20px;
            background: white;
            border: 2px solid #111827;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: grab;
            transition: box-shadow 0.15s;
            pointer-events: auto;
        }

        .slider-thumb:hover {
            box-shadow: 0 0 0 4px rgba(17, 24, 39, 0.1);
        }

        .slider-thumb:active {
            cursor: grabbing;
        }

        body {
            background-color: #f3f4f6;
        }

        .text-rosso { color: #dc2626; }
        .text-verde { color: #16a34a; }
        .text-blu { color: #2563eb; }
        .text-viola { color: #7c3aed; }
        .text-arancione { color: #ea580c; }

        .bg-rosso { background-color: #dc2626; }
        .bg-verde { background-color: #16a34a; }
        .bg-blu { background-color: #2563eb; }
        .bg-viola { background-color: #7c3aed; }
        .bg-arancione { background-color: #ea580c; }

        @keyframes pulse-badge {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .animate-pulse-badge {
            animation: pulse-badge 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
    const e = React.createElement;
    const { useState, useRef, useCallback } = React;

    function formattaNumero(num, decimali) {
        if (decimali === undefined) decimali = 2;
        var arrotondato = parseFloat(Number(num).toFixed(decimali));
        var parti = arrotondato.toString().split('.');
        var parteIntera = parti[0].replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
        if (decimali > 0 && parti[1] !== undefined) {
            return parteIntera + ',' + parti[1];
        }
        return parteIntera;
    }

    /* SLIDER con colore personalizzato */
    function Slider(props) {
        var min = props.min !== undefined ? props.min : 0;
        var max = props.max !== undefined ? props.max : 100;
        var step = props.step !== undefined ? props.step : 1;
        var value = props.value;
        var onValueChange = props.onValueChange;
        var color = props.color || "#111827";

        var containerRef = useRef(null);
        var isDragging = useRef(false);
        var val = Array.isArray(value) ? value[0] : value;
        var percentage = ((val - min) / (max - min)) * 100;

        var updateValue = useCallback(function(clientX) {
            if (!containerRef.current) return;
            var rect = containerRef.current.getBoundingClientRect();
            var x = clientX - rect.left;
            var p = Math.max(0, Math.min(1, x / rect.width));
            var newValue = min + p * (max - min);
            newValue = Math.round(newValue / step) * step;
            newValue = Math.max(min, Math.min(max, newValue));
            onValueChange([newValue]);
        }, [min, max, step, onValueChange]);

        function handleMouseDown(ev) {
            isDragging.current = true;
            updateValue(ev.clientX);
            var move = function(ev) { if (isDragging.current) updateValue(ev.clientX); };
            var up = function() {
                isDragging.current = false;
                document.removeEventListener('mousemove', move);
                document.removeEventListener('mouseup', up);
            };
            document.addEventListener('mousemove', move);
            document.addEventListener('mouseup', up);
        }

        function handleTouchStart(ev) {
            updateValue(ev.touches[0].clientX);
            var move = function(ev) { updateValue(ev.touches[0].clientX); };
            var end = function() {
                document.removeEventListener('touchmove', move);
                document.removeEventListener('touchend', end);
            };
            document.addEventListener('touchmove', move);
            document.addEventListener('touchend', end);
        }

        return e("div", { className: "space-y-2" },
            e("div", {
                ref: containerRef,
                className: "slider-container",
                onMouseDown: handleMouseDown,
                onTouchStart: handleTouchStart
            },
                e("div", { className: "slider-fill", style: { width: percentage + "%", backgroundColor: color } }),
                e("div", { className: "slider-thumb", style: { left: percentage + "%", borderColor: color } })
            )
        );
    }

    /* CARD */
    function Card(props) {
        return e("div", {
            className: "rounded-lg border bg-white shadow-sm " + (props.className || "")
        }, props.children);
    }

    function CardContent(props) {
        return e("div", {
            className: "p-6 " + (props.className || "")
        }, props.children);
    }

    /* RIGA DETTAGLIO (riusata più volte) */
    function Riga(props) {
        return e("div", { className: "flex justify-between" },
            e("span", { className: "text-gray-600" }, props.label),
            e("span", { className: props.bold ? "font-bold" : "font-semibold", style: props.stile || {} }, props.value)
        );
    }

    /* APP */
    function PlusvalenzeCalculator() {
        var s1 = useState(1000);  var capitalIniziale = s1[0];  var setCapitalIniziale = s1[1];
        var s2 = useState(100);   var pa1 = s2[0];             var setPa1 = s2[1];
        var s3 = useState(120);   var pv1 = s3[0];             var setPv1 = s3[1];
        var s4 = useState(90);    var pa2 = s4[0];             var setPa2 = s4[1];
        var s5 = useState(150);   var pv2 = s5[0];             var setPv2 = s5[1];
        var s6 = useState(26);    var t = s6[0];               var setT = s6[1];

        function setFromSlider(setter) {
            return function(val) {
                if (Array.isArray(val)) setter(val[0]);
                else setter(val);
            };
        }

        function toNumber(v) {
            var n = Number(v);
            return Number.isFinite(n) ? n : 0;
        }

        var C = toNumber(capitalIniziale);
        var PA1 = toNumber(pa1);
        var PV1 = toNumber(pv1);
        var PA2 = toNumber(pa2);
        var PV2 = toNumber(pv2);
        var TAX = toNumber(t) / 100;

        /* CASO 1: TRADARE */
        var q1 = PA1 > 0 ? C / PA1 : 0;
        var plusvalenza1 = (PV1 - PA1) * q1;
        var tasse1 = plusvalenza1 > 0 ? plusvalenza1 * TAX : 0;
        var capitaleNetto1 = q1 * PV1 - tasse1;

        var q2 = PA2 > 0 ? capitaleNetto1 / PA2 : 0;
        var plusvalenza2 = (PV2 - PA2) * q2;
        var tasse2 = plusvalenza2 > 0 ? plusvalenza2 * TAX : 0;
        var capitaleFinaleCaso1 = q2 * PV2 - tasse2;
        var tasseTotaliCaso1 = tasse1 + tasse2;
        var rendimentoCaso1 = C > 0 ? ((capitaleFinaleCaso1 - C) / C) * 100 : 0;

        /* CASO 2: HOLDARE */
        var qCaso2 = PA1 > 0 ? C / PA1 : 0;
        var plusvalenzaCaso2 = (PV2 - PA1) * qCaso2;
        var tasseCaso2 = plusvalenzaCaso2 > 0 ? plusvalenzaCaso2 * TAX : 0;
        var capitaleFinaleCaso2 = qCaso2 * PV2 - tasseCaso2;
        var rendimentoCaso2 = C > 0 ? ((capitaleFinaleCaso2 - C) / C) * 100 : 0;

        /* CONFRONTO */
        var differenzaFinale = capitaleFinaleCaso1 - capitaleFinaleCaso2;
        var differenzaPercentuale = rendimentoCaso1 - rendimentoCaso2;

        var consiglio;
        if (capitaleFinaleCaso1 > capitaleFinaleCaso2) {
            consiglio = { testo: "✅ CONVIENE TRADARE", tipo: "tradare", colore: "verde" };
        } else if (capitaleFinaleCaso2 > capitaleFinaleCaso1) {
            consiglio = { testo: "⏸️ CONVIENE HOLDARE", tipo: "holdare", colore: "blu" };
        } else {
            consiglio = { testo: "➖ NEUTRO", tipo: "neutro", colore: "grigio" };
        }

        /* Spiegazione dinamica */
        var spiegazione;
        if (consiglio.tipo === "tradare") {
            spiegazione = "Tradare conviene nonostante le maggiori tasse (€" + formattaNumero(tasseTotaliCaso1) + " vs €" + formattaNumero(tasseCaso2) + "), grazie alla flessibilità di reinvestire a prezzi migliori.";
        } else if (consiglio.tipo === "holdare") {
            spiegazione = "Holdare è più vantaggioso: risparmi €" + formattaNumero(tasseTotaliCaso1 - tasseCaso2) + " in tasse e eviti il rischio di un secondo ingresso.";
        } else {
            spiegazione = "Le due strategie sono equivalenti in questo scenario specifico.";
        }

        /* Helper per classe rendimento */
        function clsRend(val) {
            return val >= 0 ? "text-verde" : "text-rosso";
        }
        function freccia(val) {
            return val >= 0 ? "↑" : "↓";
        }

        return e("div", { className: "p-8 max-w-4xl mx-auto space-y-8 font-sans" },

            /* TITOLO */
            e("h1", { className: "text-4xl font-extrabold text-center text-black tracking-tight" },
                "💹 TRADING vs HOLDING 💹"
            ),
            e("p", { className: "text-center text-gray-500 text-sm mt-2" },
                "Tradare vs Holdare: qual è la strategia migliore?"
            ),

            /* INPUT */
            e(Card, { className: "shadow-md border-gray-200" },
                e(CardContent, { className: "space-y-6 p-6" },

                    /* Capitale iniziale */
                    e("div", { className: "space-y-2" },
                        e("div", { className: "flex justify-between text-sm text-gray-600" },
                            e("span", null, "💵 Capitale iniziale"),
                            e("span", { className: "font-bold text-viola text-lg" }, "€" + formattaNumero(capitalIniziale))
                        ),
                        e(Slider, {
                            min: 100, max: 100000, step: 100,
                            value: [capitalIniziale],
                            onValueChange: setFromSlider(setCapitalIniziale),
                            color: "#7c3aed"
                        })
                    ),

                    /* SEZIONE OPERAZIONE 1 */
                    e("div", { className: "border-t border-gray-200 pt-4" },
                        e("div", { className: "text-sm font-semibold text-gray-700 mb-3" }, "📊 Prima Operazione"),

                        e("div", { className: "space-y-2 mb-4" },
                            e("div", { className: "flex justify-between text-sm text-gray-600" },
                                e("span", null, "Prezzo Acquisto 1 (PA₁)"),
                                e("span", { className: "font-bold text-rosso text-lg" }, "€" + formattaNumero(pa1))
                            ),
                            e(Slider, {
                                min: 10, max: 1000, step: 1,
                                value: [pa1], onValueChange: setFromSlider(setPa1), color: "#dc2626"
                            })
                        ),

                        e("div", { className: "space-y-2" },
                            e("div", { className: "flex justify-between text-sm text-gray-600" },
                                e("span", null, "Prezzo Vendita 1 (PV₁)"),
                                e("span", { className: "font-bold text-verde text-lg" }, "€" + formattaNumero(pv1))
                            ),
                            e(Slider, {
                                min: 10, max: 1000, step: 1,
                                value: [pv1], onValueChange: setFromSlider(setPv1), color: "#16a34a"
                            })
                        )
                    ),

                    /* SEZIONE OPERAZIONE 2 */
                    e("div", { className: "border-t border-gray-200 pt-4" },
                        e("div", { className: "text-sm font-semibold text-gray-700 mb-3" }, "📈 Seconda Operazione"),

                        e("div", { className: "space-y-2 mb-4" },
                            e("div", { className: "flex justify-between text-sm text-gray-600" },
                                e("span", null, "Prezzo Acquisto 2 (PA₂)"),
                                e("span", { className: "font-bold text-rosso text-lg" }, "€" + formattaNumero(pa2))
                            ),
                            e(Slider, {
                                min: 10, max: 1000, step: 1,
                                value: [pa2], onValueChange: setFromSlider(setPa2), color: "#dc2626"
                            })
                        ),

                        e("div", { className: "space-y-2" },
                            e("div", { className: "flex justify-between text-sm text-gray-600" },
                                e("span", null, "Prezzo Vendita 2 (PV₂)"),
                                e("span", { className: "font-bold text-verde text-lg" }, "€" + formattaNumero(pv2))
                            ),
                            e(Slider, {
                                min: 10, max: 1000, step: 1,
                                value: [pv2], onValueChange: setFromSlider(setPv2), color: "#16a34a"
                            })
                        )
                    ),

                    /* TASSSE */
                    e("div", { className: "space-y-2 border-t border-gray-200 pt-4" },
                        e("div", { className: "flex justify-between text-sm text-gray-600" },
                            e("span", null, "🧾 Aliquota tasse (%)"),
                            e("span", { className: "font-bold text-blu text-lg" }, t + "%")
                        ),
                        e(Slider, {
                            min: 0, max: 50, step: 1,
                            value: [t], onValueChange: setFromSlider(setT), color: "#2563eb"
                        })
                    )
                )
            ),

            /* RISULTATI SIDE BY SIDE */
            e("div", { className: "grid grid-cols-1 md:grid-cols-2 gap-6" },

                /* CASO 1: TRADARE */
                e(Card, { className: "shadow-md border-gray-200" },
                    e(CardContent, { className: "p-6 space-y-4" },

                        e("div", { className: "text-center" },
                            e("h2", { className: "text-xl font-bold text-gray-800 mb-1" }, "🔄 Caso 1: TRADARE"),
                            e("p", { className: "text-xs text-gray-500" }, "Due operazioni con tasse intermedie")
                        ),

                        e("div", { className: "bg-gray-50 rounded-lg p-4 space-y-2 text-sm" },
                            e(Riga, { label: "Azioni comprate (q₁):", value: formattaNumero(q1, 4) }),
                            e(Riga, { label: "Plusvalenza 1:", value: "€" + formattaNumero(plusvalenza1), stile: { color: "#16a34a" } }),
                            e(Riga, { label: "Tasse 1:", value: "-€" + formattaNumero(tasse1), stile: { color: "#2563eb" } }),
                            e("div", { className: "border-t border-gray-200 pt-2 flex justify-between" },
                                e("span", { className: "text-gray-700 font-medium" }, "Capitale netto dopo op. 1:"),
                                e("span", { className: "font-bold" }, "€" + formattaNumero(capitaleNetto1))
                            ),
                            e("div", { className: "border-t border-gray-200 pt-2 mt-2" },
                                e(Riga, { label: "Azioni ricomprate (q₂):", value: formattaNumero(q2, 4) }),
                                e(Riga, { label: "Plusvalenza 2:", value: "€" + formattaNumero(plusvalenza2), stile: { color: "#16a34a" } }),
                                e(Riga, { label: "Tasse 2:", value: "-€" + formattaNumero(tasse2), stile: { color: "#2563eb" } })
                            )
                        ),

                        e("div", { className: "text-center pt-2 border-t border-gray-200" },
                            e("div", { className: "text-sm text-gray-600" }, "Capitale Finale"),
                            e("div", { className: "text-3xl font-bold text-viola mt-1" }, "€" + formattaNumero(capitaleFinaleCaso1)),
                            e("div", { className: "text-sm font-semibold mt-1 " + clsRend(rendimentoCaso1) },
                                freccia(rendimentoCaso1) + " " + Math.abs(rendimentoCaso1).toFixed(2) + "%"
                            ),
                            e("div", { className: "text-xs text-gray-500 mt-1" },
                                "Tasse totali: €" + formattaNumero(tasseTotaliCaso1)
                            )
                        )
                    )
                ),

                /* CASO 2: HOLDARE */
                e(Card, { className: "shadow-md border-gray-200" },
                    e(CardContent, { className: "p-6 space-y-4" },

                        e("div", { className: "text-center" },
                            e("h2", { className: "text-xl font-bold text-gray-800 mb-1" }, "⏸️ Caso 2: HOLDARE"),
                            e("p", { className: "text-xs text-gray-500" }, "Una sola operazione, tasse finali")
                        ),

                        e("div", { className: "bg-gray-50 rounded-lg p-4 space-y-2 text-sm" },
                            e(Riga, { label: "Azioni comprate (q):", value: formattaNumero(qCaso2, 4) }),
                            e(Riga, { label: "Plusvalenza totale:", value: "€" + formattaNumero(plusvalenzaCaso2), stile: { color: "#16a34a" } }),
                            e(Riga, { label: "Tasse (solo alla fine):", value: "-€" + formattaNumero(tasseCaso2), stile: { color: "#2563eb" } })
                        ),

                        e("div", { className: "text-center pt-2 border-t border-gray-200" },
                            e("div", { className: "text-sm text-gray-600" }, "Capitale Finale"),
                            e("div", { className: "text-3xl font-bold text-viola mt-1" }, "€" + formattaNumero(capitaleFinaleCaso2)),
                            e("div", { className: "text-sm font-semibold mt-1 " + clsRend(rendimentoCaso2) },
                                freccia(rendimentoCaso2) + " " + Math.abs(rendimentoCaso2).toFixed(2) + "%"
                            ),
                            e("div", { className: "text-xs text-gray-500 mt-1" },
                                "Tasse totali: €" + formattaNumero(tasseCaso2)
                            )
                        )
                    )
                )
            ),

            /* CONFRONTO FINALE */
            e(Card, { className: "shadow-lg border-2 border-gray-300" },
                e(CardContent, { className: "p-6 space-y-4" },

                    e("h2", { className: "text-2xl font-bold text-center text-gray-800 mb-4" }, "⚖️ CONFRONTO FINALE"),

                    /* BADGE */
                    e("div", { className: "text-center mb-6" },
                        e("div", {
                            className: "inline-block px-8 py-4 rounded-full text-white text-xl font-bold shadow-lg animate-pulse-badge " +
                                (consiglio.colore === "verde" ? "bg-verde" :
                                 consiglio.colore === "blu" ? "bg-blu" : "bg-gray-500")
                        }, consiglio.testo)
                    ),

                    /* 3 COLONNE */
                    e("div", { className: "grid grid-cols-1 md:grid-cols-3 gap-4 text-center" },

                        e("div", { className: "bg-gray-50 rounded-lg p-4" },
                            e("div", { className: "text-xs text-gray-500 uppercase tracking-wide mb-1" }, "Differenza Assoluta"),
                            e("div", { className: "text-2xl font-bold " + (differenzaFinale >= 0 ? "text-verde" : "text-rosso") },
                                (differenzaFinale >= 0 ? "+" : "") + "€" + formattaNumero(differenzaFinale)
                            ),
                            e("div", { className: "text-xs text-gray-400 mt-1" }, "(Tradare - Holdare)")
                        ),

                        e("div", { className: "bg-gray-50 rounded-lg p-4" },
                            e("div", { className: "text-xs text-gray-500 uppercase tracking-wide mb-1" }, "Differenza %"),
                            e("div", { className: "text-2xl font-bold " + (differenzaPercentuale >= 0 ? "text-verde" : "text-rosso") },
                                (differenzaPercentuale >= 0 ? "+" : "") + differenzaPercentuale.toFixed(2) + "%"
                            ),
                            e("div", { className: "text-xs text-gray-400 mt-1" }, "(Rendimento relativo)")
                        ),

                        e("div", { className: "bg-gray-50 rounded-lg p-4" },
                            e("div", { className: "text-xs text-gray-500 uppercase tracking-wide mb-1" }, "Risparmio Tasse"),
                            e("div", { className: "text-2xl font-bold text-blu" },
                                "€" + formattaNumero(Math.abs(tasseTotaliCaso1 - tasseCaso2))
                            ),
                            e("div", { className: "text-xs text-gray-400 mt-1" }, "(Holdare vs Tradare)")
                        )
                    ),

                    /* SPIEGAZIONE */
                    e("div", { className: "mt-6 p-4 bg-blue-50 rounded-lg border border-blue-200" },
                        e("div", { className: "text-sm text-blue-900" },
                            e("strong", null, "💡 Analisi: "),
                            spiegazione
                        )
                    )
                )
            ),

            /* LEGENDA */
            e(Card, { className: "shadow-sm border-gray-100" },
                e(CardContent, { className: "p-6" },
                    e("div", { className: "text-sm font-medium text-gray-700 mb-3" }, "Legenda colori:"),
                    e("div", { className: "flex flex-wrap gap-4 text-xs" },
                        e("span", null, e("span", { className: "inline-block w-3 h-3 rounded-full bg-viola mr-1" }), "Capitale"),
                        e("span", null, e("span", { className: "inline-block w-3 h-3 rounded-full bg-red-500 mr-1" }), "Prezzi Acquisto"),
                        e("span", null, e("span", { className: "inline-block w-3 h-3 rounded-full bg-green-500 mr-1" }), "Prezzi Vendita / Profitto"),
                        e("span", null, e("span", { className: "inline-block w-3 h-3 rounded-full bg-blue-500 mr-1" }), "Tasse")
                    )
                )
            ),

            /* FOOTER */
            e("div", { className: "text-center text-xs text-gray-400 pt-4 pb-8" },
                "Trading o holding, questo è il dilemma..."
            )
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(e(PlusvalenzeCalculator));
    </script>
</body>
</html>
