<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💹 TRADING vs HOLDING</title>
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel per JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* Stili custom per lo slider */
        .slider-container {
            position: relative;
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 9999px;
            cursor: pointer;
        }
        
        .slider-fill {
            position: absolute;
            height: 100%;
            background: #111827;
            border-radius: 9999px;
            pointer-events: none;
        }
        
        .slider-thumb {
            position: absolute;
            top: 50%;
            width: 20px;
            height: 20px;
            background: white;
            border: 2px solid #111827;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: grab;
            transition: box-shadow 0.15s;
            pointer-events: auto;
        }
        
        .slider-thumb:hover {
            box-shadow: 0 0 0 4px rgba(17, 24, 39, 0.1);
        }
        
        .slider-thumb:active {
            cursor: grabbing;
        }
        
        body {
            background-color: #f3f4f6;
        }

        /* Colori personalizzati */
        .text-rosso { color: #dc2626; }
        .text-verde { color: #16a34a; }
        .text-blu { color: #2563eb; }
        .text-viola { color: #7c3aed; }
        .text-arancione { color: #ea580c; }

        .bg-rosso { background-color: #dc2626; }
        .bg-verde { background-color: #16a34a; }
        .bg-blu { background-color: #2563eb; }
        .bg-viola { background-color: #7c3aed; }
        .bg-arancione { background-color: #ea580c; }

        /* Animazione per il badge */
        @keyframes pulse-badge {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .animate-pulse-badge {
            animation: pulse-badge 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useCallback } = React;

        // ✅ Funzione per formattare numeri con spazi ogni 3 cifre
        const formattaNumero = (num, decimali = 2) => {
            const arrotondato = parseFloat(num.toFixed(decimali));
            const [parteIntera, parteDecimale] = arrotondato.toString().split('.');
            const parteInteraFormattata = parteIntera.replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
            
            if (decimali > 0 && parteDecimale !== undefined) {
                return `${parteInteraFormattata},${parteDecimale}`;
            }
            return parteInteraFormattata;
        };

        // 🎚️ Componente Slider Custom
        function Slider({ min = 0, max = 100, step = 1, value, onValueChange, color = "#111827" }) {
            const containerRef = useRef(null);
            const isDragging = useRef(false);

            const percentage = ((value[0] - min) / (max - min)) * 100;

            const updateValue = useCallback((clientX) => {
                if (!containerRef.current) return;
                
                const rect = containerRef.current.getBoundingClientRect();
                const x = clientX - rect.left;
                const percentage = Math.max(0, Math.min(1, x / rect.width));
                let newValue = min + percentage * (max - min);
                
                newValue = Math.round(newValue / step) * step;
                newValue = Math.max(min, Math.min(max, newValue));
                
                onValueChange([newValue]);
            }, [min, max, step, onValueChange]);

            const handleMouseDown = (e) => {
                isDragging.current = true;
                updateValue(e.clientX);
                
                const handleMouseMove = (e) => {
                    if (isDragging.current) {
                        updateValue(e.clientX);
                    }
                };
                
                const handleMouseUp = () => {
                    isDragging.current = false;
                    document.removeEventListener('mousemove', handleMouseMove);
                    document.removeEventListener('mouseup', handleMouseUp);
                };
                
                document.addEventListener('mousemove', handleMouseMove);
                document.addEventListener('mouseup', handleMouseUp);
            };

            const handleTouchStart = (e) => {
                updateValue(e.touches[0].clientX);
                
                const handleTouchMove = (e) => {
                    updateValue(e.touches[0].clientX);
                };
                
                const handleTouchEnd = () => {
                    document.removeEventListener('touchmove', handleTouchMove);
                    document.removeEventListener('touchend', handleTouchEnd);
                };
                
                document.addEventListener('touchmove', handleTouchMove);
                document.addEventListener('touchend', handleTouchEnd);
            };

            return (
                <div className="space-y-2">
                    <div 
                        ref={containerRef}
                        className="slider-container"
                        onMouseDown={handleMouseDown}
                        onTouchStart={handleTouchStart}
                    >
                        <div 
                            className="slider-fill" 
                            style={{ width: `${percentage}%`, backgroundColor: color }}
                        />
                        <div 
                            className="slider-thumb" 
                            style={{ left: `${percentage}%`, borderColor: color }}
                        />
                    </div>
                </div>
            );
        }

        // 🃏 Componente Card
        function Card({ children, className = "" }) {
            return (
                <div className={`rounded-lg border bg-white shadow-sm ${className}`}>
                    {children}
                </div>
            );
        }

        function CardContent({ children, className = "" }) {
            return (
                <div className={`p-6 ${className}`}>
                    {children}
                </div>
            );
        }

        // 💰 App Principale
        function PlusvalenzeCalculator() {
            const [capitalIniziale, setCapitalIniziale] = useState(1000);
            const [pa1, setPa1] = useState(100);
            const [pv1, setPv1] = useState(120);
            const [pa2, setPa2] = useState(90);
            const [pv2, setPv2] = useState(150);
            const [t, setT] = useState(26);

            const setFromSlider = (setter) => (val) => {
                if (Array.isArray(val)) setter(val[0]);
                else setter(val);
            };

            const toNumber = (v) => {
                const n = Number(v);
                return Number.isFinite(n) ? n : 0;
            };

            const C = toNumber(capitalIniziale);
            const PA1 = toNumber(pa1);
            const PV1 = toNumber(pv1);
            const PA2 = toNumber(pa2);
            const PV2 = toNumber(pv2);
            const TAX = toNumber(t) / 100;

            // Caso 1: Tradare (due operazioni)
            const q1 = PA1 > 0 ? C / PA1 : 0;
            const plusvalenza1 = (PV1 - PA1) * q1;
            const tasse1 = plusvalenza1 > 0 ? plusvalenza1 * TAX : 0;
            const capitaleNetto1 = q1 * PV1 - tasse1;

            const q2 = PA2 > 0 ? capitaleNetto1 / PA2 : 0;
            const plusvalenza2 = (PV2 - PA2) * q2;
            const tasse2 = plusvalenza2 > 0 ? plusvalenza2 * TAX : 0;
            const capitaleFinaleCaso1 = q2 * PV2 - tasse2;
            const tasseTotaliCaso1 = tasse1 + tasse2;

            // Rendimento Caso 1
            const rendimentoCaso1 = C > 0 ? ((capitaleFinaleCaso1 - C) / C) * 100 : 0;

            // Caso 2: Holdare (una sola operazione)
            const qCaso2 = PA1 > 0 ? C / PA1 : 0;
            const plusvalenzaCaso2 = (PV2 - PA1) * qCaso2;
            const tasseCaso2 = plusvalenzaCaso2 > 0 ? plusvalenzaCaso2 * TAX : 0;
            const capitaleFinaleCaso2 = qCaso2 * PV2 - tasseCaso2;

            // Rendimento Caso 2
            const rendimentoCaso2 = C > 0 ? ((capitaleFinaleCaso2 - C) / C) * 100 : 0;

            // Confronto
            const differenzaFinale = capitaleFinaleCaso1 - capitaleFinaleCaso2;
            const differenzaPercentuale = rendimentoCaso1 - rendimentoCaso2;
            
            const consiglio = capitaleFinaleCaso1 > capitaleFinaleCaso2
                ? { testo: "✅ CONVIENE TRADARE", tipo: "tradare", colore: "verde" }
                : capitaleFinaleCaso2 > capitaleFinaleCaso1
                ? { testo: "⏸️ CONVIENE HOLDARE", tipo: "holdare", colore: "blu" }
                : { testo: "➖ NEUTRO", tipo: "neutro", colore: "grigio" };

            // Calcolo break-even PA2
            // Per pareggio: capitaleFinaleCaso1 == capitaleFinaleCaso2
            // Semplificato: se PV2 > PA1, conviene holdare per minori tasse
            const pa2BreakEven = PA2; // Placeholder - logica complessa

            return (
                <div className="p-8 max-w-4xl mx-auto space-y-8 font-sans">
                    
                    {/* Titolo */}
                    <h1 className="text-4xl font-extrabold text-center text-black tracking-tight">
                       💹 TRADING vs HOLDING 💹
                    </h1>
                    <p className="text-center text-gray-500 text-sm mt-2">
                        Tradare vs Holdare: qual è la strategia migliore?
                    </p>

                    {/* Input Parameters */}
                    <Card className="shadow-md border-gray-200">
                        <CardContent className="space-y-6 p-6">
                            
                            {/* Capitale iniziale - VIOLA */}
                            <div className="space-y-2">
                                <div className="flex justify-between text-sm text-gray-600">
                                    <span>💵 Capitale iniziale</span>
                                    <span className="font-bold text-viola text-lg">€{formattaNumero(capitalIniziale)}</span>
                                </div>
                                <Slider
                                    min={100}
                                    max={100000}
                                    step={100}
                                    value={[capitalIniziale]}
                                    onValueChange={setFromSlider(setCapitalIniziale)}
                                    color="#7c3aed"
                                />
                            </div>

                            <div className="border-t border-gray-200 pt-4">
                                <div className="text-sm font-semibold text-gray-700 mb-3">📊 Prima Operazione</div>
                                
                                {/* PA1 - ROSSO */}
                                <div className="space-y-2 mb-4">
                                    <div className="flex justify-between text-sm text-gray-600">
                                        <span>Prezzo Acquisto 1 (PA₁)</span>
                                        <span className="font-bold text-rosso text-lg">€{formattaNumero(pa1)}</span>
                                    </div>
                                    <Slider
                                        min={10}
                                        max={1000}
                                        step={1}
                                        value={[pa1]}
                                        onValueChange={setFromSlider(setPa1)}
                                        color="#dc2626"
                                    />
                                </div>

                                {/* PV1 - VERDE */}
                                <div className="space-y-2">
                                    <div className="flex justify-between text-sm text-gray-600">
                                        <span>Prezzo Vendita 1 (PV₁)</span>
                                        <span className="font-bold text-verde text-lg">€{formattaNumero(pv1)}</span>
                                    </div>
                                    <Slider
                                        min={10}
                                        max={1000}
                                        step={1}
                                        value={[pv1]}
                                        onValueChange={setFromSlider(setPv1)}
                                        color="#16a34a"
                                    />
                                </div>
                            </div>

                            <div className="border-t border-gray-200 pt-4">
                                <div className="text-sm font-semibold text-gray-700 mb-3">📈 Seconda Operazione</div>
                                
                                {/* PA2 - ROSSO */}
                                <div className="space-y-2 mb-4">
                                    <div className="flex justify-between text-sm text-gray-600">
                                        <span>Prezzo Acquisto 2 (PA₂)</span>
                                        <span className="font-bold text-rosso text-lg">€{formattaNumero(pa2)}</span>
                                    </div>
                                    <Slider
                                        min={10}
                                        max={1000}
                                        step={1}
                                        value={[pa2]}
                                        onValueChange={setFromSlider(setPa2)}
                                        color="#dc2626"
                                    />
                                </div>

                                {/* PV2 - VERDE */}
                                <div className="space-y-2">
                                    <div className="flex justify-between text-sm text-gray-600">
                                        <span>Prezzo Vendita 2 (PV₂)</span>
                                        <span className="font-bold text-verde text-lg">€{formattaNumero(pv2)}</span>
                                    </div>
                                    <Slider
                                        min={10}
                                        max={1000}
                                        step={1}
                                        value={[pv2]}
                                        onValueChange={setFromSlider(setPv2)}
                                        color="#16a34a"
                                    />
                                </div>
                            </div>

                            {/* Tasse - BLU */}
                            <div className="space-y-2 border-t border-gray-200 pt-4">
                                <div className="flex justify-between text-sm text-gray-600">
                                    <span>🧾 Aliquota tasse (%)</span>
                                    <span className="font-bold text-blu text-lg">{t}%</span>
                                </div>
                                <Slider
                                    min={0}
                                    max={50}
                                    step={1}
                                    value={[t]}
                                    onValueChange={setFromSlider(setT)}
                                    color="#2563eb"
                                />
                            </div>
                        </CardContent>
                    </Card>

                    {/* Risultati Side by Side */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        
                        {/* Caso 1: Tradare */}
                        <Card className="shadow-md border-gray-200">
                            <CardContent className="p-6 space-y-4">
                                <div className="text-center">
                                    <h2 className="text-xl font-bold text-gray-800 mb-1">
                                        🔄 Caso 1: TRADARE
                                    </h2>
                                    <p className="text-xs text-gray-500">Due operazioni con tasse intermedie</p>
                                </div>
                                
                                <div className="bg-gray-50 rounded-lg p-4 space-y-2 text-sm">
                                    <div className="flex justify-between">
                                        <span className="text-gray-600">Azioni comprate (q₁):</span>
                                        <span className="font-semibold">{formattaNumero(q1, 4)}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-gray-600">Plusvalenza 1:</span>
                                        <span className="font-semibold text-verde">€{formattaNumero(plusvalenza1)}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-gray-600">Tasse 1:</span>
                                        <span className="font-semibold text-blu">-€{formattaNumero(tasse1)}</span>
                                    </div>
                                    <div className="border-t border-gray-200 pt-2 flex justify-between">
                                        <span className="text-gray-700 font-medium">Capitale netto dopo op. 1:</span>
                                        <span className="font-bold">€{formattaNumero(capitaleNetto1)}</span>
                                    </div>
                                    
                                    <div className="border-t border-gray-200 pt-2 mt-2">
                                        <div className="flex justify-between">
                                            <span className="text-gray-600">Azioni ricomprate (q₂):</span>
                                            <span className="font-semibold">{formattaNumero(q2, 4)}</span>
                                        </div>
                                        <div className="flex justify-between">
                                            <span className="text-gray-600">Plusvalenza 2:</span>
                                            <span className="font-semibold text-verde">€{formattaNumero(plusvalenza2)}</span>
                                        </div>
                                        <div className="flex justify-between">
                                            <span className="text-gray-600">Tasse 2:</span>
                                            <span className="font-semibold text-blu">-€{formattaNumero(tasse2)}</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="text-center pt-2 border-t border-gray-200">
                                    <div className="text-sm text-gray-600">Capitale Finale</div>
                                    <div className="text-3xl font-bold text-viola mt-1">
                                        €{formattaNumero(capitaleFinaleCaso1)}
                                    </div>
                                    <div className={`text-sm font-semibold mt-1 ${rendimentoCaso1 >= 0 ? 'text-verde' : 'text-rosso'}`}>
                                        {rendimentoCaso1 >= 0 ? '↑' : '↓'} {Math.abs(rendimentoCaso1).toFixed(2)}%
                                    </div>
                                    <div className="text-xs text-gray-500 mt-1">
                                        Tasse totali: €{formattaNumero(tasseTotaliCaso1)}
                                    </div>
                                </div>
                            </CardContent>
                        </Card>

                        {/* Caso 2: Holdare */}
                        <Card className="shadow-md border-gray-200">
                            <CardContent className="p-6 space-y-4">
                                <div className="text-center">
                                    <h2 className="text-xl font-bold text-gray-800 mb-1">
                                        ⏸️ Caso 2: HOLDARE
                                    </h2>
                                    <p className="text-xs text-gray-500">Una sola operazione, tasse finali</p>
                                </div>
                                
                                <div className="bg-gray-50 rounded-lg p-4 space-y-2 text-sm">
                                    <div className="flex justify-between">
                                        <span className="text-gray-600">Azioni comprate (q):</span>
                                        <span className="font-semibold">{formattaNumero(qCaso2, 4)}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-gray-600">Plusvalenza totale:</span>
                                        <span className="font-semibold text-verde">€{formattaNumero(plusvalenzaCaso2)}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-gray-600">Tasse (solo alla fine):</span>
                                        <span className="font-semibold text-blu">-€{formattaNumero(tasseCaso2)}</span>
                                    </div>
                                </div>

                                <div className="text-center pt-2 border-t border-gray-200">
                                    <div className="text-sm text-gray-600">Capitale Finale</div>
                                    <div className="text-3xl font-bold text-viola mt-1">
                                        €{formattaNumero(capitaleFinaleCaso2)}
                                    </div>
                                    <div className={`text-sm font-semibold mt-1 ${rendimentoCaso2 >= 0 ? 'text-verde' : 'text-rosso'}`}>
                                        {rendimentoCaso2 >= 0 ? '↑' : '↓'} {Math.abs(rendimentoCaso2).toFixed(2)}%
                                    </div>
                                    <div className="text-xs text-gray-500 mt-1">
                                        Tasse totali: €{formattaNumero(tasseCaso2)}
                                    </div>
                                </div>
                            </CardContent>
                        </Card>
                    </div>

                    {/* Confronto Finale */}
                    <Card className="shadow-lg border-2 border-gray-300">
                        <CardContent className="p-6 space-y-4">
                            <h2 className="text-2xl font-bold text-center text-gray-800 mb-4">
                                ⚖️ CONFRONTO FINALE
                            </h2>
                            
                            {/* Badge Raccomandazione */}
                            <div className="text-center mb-6">
                                <div className={`inline-block px-8 py-4 rounded-full text-white text-xl font-bold shadow-lg animate-pulse-badge ${
                                    consiglio.colore === 'verde' ? 'bg-verde' :
                                    consiglio.colore === 'blu' ? 'bg-blu' :
                                    'bg-gray-500'
                                }`}>
                                    {consiglio.testo}
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 text-center">
                                <div className="bg-gray-50 rounded-lg p-4">
                                    <div className="text-xs text-gray-500 uppercase tracking-wide mb-1">Differenza Assoluta</div>
                                    <div className={`text-2xl font-bold ${differenzaFinale >= 0 ? 'text-verde' : 'text-rosso'}`}>
                                        {differenzaFinale >= 0 ? '+' : ''}€{formattaNumero(differenzaFinale)}
                                    </div>
                                    <div className="text-xs text-gray-400 mt-1">(Tradare - Holdare)</div>
                                </div>
                                
                                <div className="bg-gray-50 rounded-lg p-4">
                                    <div className="text-xs text-gray-500 uppercase tracking-wide mb-1">Differenza %</div>
                                    <div className={`text-2xl font-bold ${differenzaPercentuale >= 0 ? 'text-verde' : 'text-rosso'}`}>
                                        {differenzaPercentuale >= 0 ? '+' : ''}{differenzaPercentuale.toFixed(2)}%
                                    </div>
                                    <div className="text-xs text-gray-400 mt-1">(Rendimento relativo)</div>
                                </div>
                                
                                <div className="bg-gray-50 rounded-lg p-4">
                                    <div className="text-xs text-gray-500 uppercase tracking-wide mb-1">Risparmio Tasse</div>
                                    <div className="text-2xl font-bold text-blu">
                                        €{formattaNumero(Math.abs(tasseTotaliCaso1 - tasseCaso2))}
                                    </div>
                                    <div className="text-xs text-gray-400 mt-1">(Holdare vs Tradare)</div>
                                </div>
                            </div>

                            {/* Spiegazione */}
                            <div className="mt-6 p-4 bg-blue-50 rounded-lg border border-blue-200">
                                <div className="text-sm text-blue-900">
                                    <strong>💡 Analisi:</strong>{' '}
                                    {consiglio.tipo === 'tradare' 
                                        ? `Tradare conviene nonostante le maggiori tasse (€${formattaNumero(tasseTotaliCaso1)} vs €${formattaNumero(tasseCaso2)}), grazie alla flessibilità di reinvestire a prezzi migliori.`
                                        : consiglio.tipo === 'holdare'
                                        ? `Holdare è più vantaggioso: risparmi €${formattaNumero(tasseTotaliCaso1 - tasseCaso2)} in tasse e eviti il rischio di un secondo ingresso.`
                                        : 'Le due strategie sono equivalenti in questo scenario specifico.'
                                    }
                                </div>
                            </div>
                        </CardContent>
                    </Card>

                    {/* Legenda Colori */}
                    <Card className="shadow-sm border-gray-100">
                        <CardContent className="p-6">
                            <div className="text-sm font-medium text-gray-700 mb-3">Legenda colori:</div>
                            <div className="flex flex-wrap gap-4 text-xs">
                                <span><span className="inline-block w-3 h-3 rounded-full bg-viola mr-1"></span>Capitale</span>
                                <span><span className="inline-block w-3 h-3 rounded-full bg-red-500 mr-1"></span>Prezzi Acquisto</span>
                                <span><span className="inline-block w-3 h-3 rounded-full bg-green-500 mr-1"></span>Prezzi Vendita / Profitto</span>
                                <span><span className="inline-block w-3 h-3 rounded-full bg-blue-500 mr-1"></span>Tasse</span>
                            </div>
                        </CardContent>
                    </Card>

                    {/* Footer */}
                    <div className="text-center text-xs text-gray-400 pt-4 pb-8">
                        Trading o holding, questo è il dilemma...
                    </div>
                </div>
            );
        }

        // Render dell'app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PlusvalenzeCalculator />);
    </script>
</body>
</html>
